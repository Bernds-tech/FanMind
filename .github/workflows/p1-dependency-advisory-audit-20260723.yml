name: FanMind P1 Dependency Advisory Audit

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/p1-dependency-advisory-audit-20260723.yml"

concurrency:
  group: fanmind-p1-dependency-advisory-audit-20260723
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'audit/p1-supply-chain-20260723-v2'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      REPORT_PATH: fanmind-p1-dependency-advisory-audit.txt
    steps:
      - name: Checkout trusted audit branch
        uses: actions/checkout@v4
        with:
          ref: audit/p1-supply-chain-20260723-v2
          fetch-depth: 1
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies reproducibly
        run: |
          set -euo pipefail
          npm ci --no-audit --no-fund
          npm ci --prefix apps/mobile --no-audit --no-fund

      - name: Produce bounded advisory summary
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE' | tee "$REPORT_PATH"
          const { spawnSync } = require('node:child_process');
          const path = require('node:path');

          function audit(cwd, label) {
            const result = spawnSync('npm', ['audit', '--json'], {
              cwd,
              encoding: 'utf8',
              stdio: ['ignore', 'pipe', 'ignore'],
              timeout: 120000,
            });
            let payload;
            try {
              payload = JSON.parse(result.stdout || '{}');
            } catch {
              throw new Error(`${label}_audit_json_invalid`);
            }
            const vulnerabilities = payload?.vulnerabilities && typeof payload.vulnerabilities === 'object'
              ? payload.vulnerabilities
              : {};
            for (const [name, item] of Object.entries(vulnerabilities).sort(([a], [b]) => a.localeCompare(b))) {
              const fix = item?.fixAvailable;
              const fixText = fix === true
                ? 'available'
                : fix && typeof fix === 'object'
                  ? `${String(fix.name || name)}@${String(fix.version || 'unknown')}|major:${Boolean(fix.isSemVerMajor)}`
                  : 'none';
              const via = Array.isArray(item?.via)
                ? item.via
                    .map(entry => typeof entry === 'string'
                      ? entry
                      : `GHSA:${String(entry?.source || 'unknown')}|title:${String(entry?.title || 'unknown').replace(/[|\r\n]/g, '_')}`)
                    .slice(0, 8)
                    .join(',')
                : 'unknown';
              console.log(
                `${label}_VULNERABILITY=${name}|severity:${String(item?.severity || 'unknown')}|direct:${Boolean(item?.isDirect)}|range:${String(item?.range || 'unknown').replace(/[|\r\n]/g, '_')}|fix:${fixText}|via:${via}`,
              );
            }
            const metadata = payload?.metadata?.vulnerabilities || {};
            console.log(`${label}_TOTAL=${Number(metadata.total || 0)}`);
            console.log(`${label}_HIGH=${Number(metadata.high || 0)}`);
            console.log(`${label}_CRITICAL=${Number(metadata.critical || 0)}`);
          }

          console.log(`AUDIT_UTC=${new Date().toISOString()}`);
          audit(process.cwd(), 'ROOT');
          audit(path.join(process.cwd(), 'apps/mobile'), 'MOBILE');
          console.log('NO_ENVIRONMENT_VALUES_READ=true');
          console.log('DEPENDENCY_ADVISORY_AUDIT_RESULT=success');
          NODE

      - name: Upload sanitized advisory evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fanmind-p1-dependency-advisory-audit
          path: fanmind-p1-dependency-advisory-audit.txt
          if-no-files-found: error
          retention-days: 7
