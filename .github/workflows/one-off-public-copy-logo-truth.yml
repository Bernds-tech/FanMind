name: One-off public copy and logo truth polish

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  apply:
    if: github.head_ref == 'fix/public-copy-logo-truth-20260713'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout polish branch
        uses: actions/checkout@v4
        with:
          ref: fix/public-copy-logo-truth-20260713
          fetch-depth: 0
          persist-credentials: true

      - name: Apply deterministic public-copy polish
        id: codemod
        shell: bash
        run: |
          set +e
          python3 scripts/one-off/public-copy-logo-truth.py > /tmp/public-copy-polish.log 2>&1
          status=$?
          cat /tmp/public-copy-polish.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Report codemod failure
        if: steps.codemod.outputs.status != '0'
        shell: bash
        run: |
          {
            echo '## Public-copy-Polish fehlgeschlagen'
            echo
            echo '```text'
            tail -n 100 /tmp/public-copy-polish.log
            echo '```'
          } > /tmp/public-copy-polish-comment.md
          gh pr comment 563 --repo "$GITHUB_REPOSITORY" --body-file /tmp/public-copy-polish-comment.md
          exit 1

      - name: Validate generated patch
        run: |
          git diff --check
          git status --short

      - name: Commit generated source changes and remove one-off helpers
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            src/app/landing-v2/page.tsx \
            src/app/landing-v2/FaqAccordion.tsx \
            src/lib/fanmindCopy.ts \
            src/app/brandMetadata.ts \
            src/app/opengraph-image.tsx \
            src/app/impressum/page.tsx \
            src/components/PlatformLogo.module.css \
            scripts/verify-product-truth.mjs \
            docs/SOURCE_OF_TRUTH.md

          git rm \
            .github/workflows/one-off-public-copy-logo-truth.yml \
            scripts/one-off/public-copy-logo-truth.py

          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi

          git commit -m "fix: finish public terminology and channel-logo consistency"
          git push origin HEAD:fix/public-copy-logo-truth-20260713
