name: One-off compare landing languages 20260719

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  compare:
    runs-on: ubuntu-24.04
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
      FANMIND_PUBLIC_DEMO_ENABLED: false
      FANMIND_ENABLE_REFERRAL_BILLING: false
      FANMIND_ENABLE_TELEGRAM_SEND: false
      FANMIND_ADMIN_EMAILS: admin@example.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - name: Start application
        run: |
          FANMIND_RELEASE_COMMIT="$(git rev-parse HEAD)" npm start > /tmp/fanmind-lang-compare.log 2>&1 &
          echo $! > /tmp/fanmind-lang-compare.pid
          for attempt in $(seq 1 30); do
            if curl -fsS 'http://127.0.0.1:3000/' -o /tmp/fanmind-de.html && curl -fsS 'http://127.0.0.1:3000/?lang=en' -o /tmp/fanmind-en.html; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/fanmind-lang-compare.log
          exit 1
      - name: Compare visible text nodes
        run: |
          python3 - <<'PY'
          from collections import Counter
          from html.parser import HTMLParser
          from pathlib import Path
          import re

          class TextParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.skip = 0
                  self.nodes = []
              def handle_starttag(self, tag, attrs):
                  if tag in {"script", "style", "svg"}:
                      self.skip += 1
              def handle_endtag(self, tag):
                  if tag in {"script", "style", "svg"} and self.skip:
                      self.skip -= 1
              def handle_data(self, data):
                  if self.skip:
                      return
                  value = " ".join(data.split())
                  if value:
                      self.nodes.append(value)

          def parse(path):
              parser = TextParser()
              parser.feed(Path(path).read_text(encoding='utf-8'))
              return parser.nodes

          de = parse('/tmp/fanmind-de.html')
          en = parse('/tmp/fanmind-en.html')
          de_counts = Counter(de)
          en_counts = Counter(en)

          identical = []
          for node in de:
              if node not in en_counts or node in identical:
                  continue
              if not re.search(r'[A-Za-zÄÖÜäöüß]', node):
                  continue
              identical.append(node)

          lines = [f'IDENTICAL_NODE_COUNT={len(identical)}']
          lines.extend(
              f'IDENTICAL_NODE_{index:03d}={node}'
              for index, node in enumerate(identical, 1)
          )
          Path('/tmp/landing-identical-language-nodes.txt').write_text(
              '\n'.join(lines) + '\n',
              encoding='utf-8',
          )
          print('\n'.join(lines))
          PY
      - name: Upload comparison report
        uses: actions/upload-artifact@v4
        with:
          name: landing-identical-language-nodes
          path: /tmp/landing-identical-language-nodes.txt
          retention-days: 7
      - name: Stop application
        if: always()
        run: |
          if [ -f /tmp/fanmind-lang-compare.pid ]; then
            kill "$(cat /tmp/fanmind-lang-compare.pid)" 2>/dev/null || true
          fi
