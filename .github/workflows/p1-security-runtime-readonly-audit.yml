name: FanMind P1 Security Runtime Read-only Audit

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/p1-security-runtime-readonly-audit.yml"

concurrency:
  group: fanmind-p1-security-runtime-readonly-audit
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'audit/p1-security-runtime-20260723'
    runs-on:
      - self-hosted
      - fanmind-prod
      - exoscale
      - linux
      - x64
    timeout-minutes: 15
    env:
      REPORT_PATH: fanmind-p1-security-runtime-readonly-audit.txt
    steps:
      - name: Confirm exact trusted Production release
        shell: bash
        run: |
          set -euo pipefail
          report="$GITHUB_WORKSPACE/$REPORT_PATH"
          : > "$report"

          live_release="$(curl -fsSL --max-time 15 https://fanmind.ch/api/version \
            | node -e '
                let input = "";
                process.stdin.on("data", chunk => input += chunk);
                process.stdin.on("end", () => {
                  try {
                    const payload = JSON.parse(input);
                    const release = typeof payload.releaseCommit === "string" ? payload.releaseCommit : "";
                    process.stdout.write(/^[0-9a-f]{40}$/.test(release) ? release : "missing");
                  } catch {
                    process.stdout.write("missing");
                  }
                });
              ')"
          server_head="$(git -C /var/www/fanmind rev-parse HEAD)"
          origin_main="$(git -C /var/www/fanmind rev-parse origin/main)"

          printf 'AUDIT_UTC=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" | tee -a "$report"
          printf 'LIVE_RELEASE=%s\n' "$live_release" | tee -a "$report"
          printf 'SERVER_HEAD=%s\n' "$server_head" | tee -a "$report"
          printf 'ORIGIN_MAIN=%s\n' "$origin_main" | tee -a "$report"
          if [[ "$live_release" != "$server_head" || "$server_head" != "$origin_main" ]]; then
            echo 'RELEASE_SYNC=failed' | tee -a "$report"
            exit 1
          fi
          echo 'RELEASE_SYNC=ok' | tee -a "$report"

      - name: Inspect nginx proxy trust configuration without raw output
        shell: bash
        run: |
          set -euo pipefail
          report="$GITHUB_WORKSPACE/$REPORT_PATH"
          config="$RUNNER_TEMP/fanmind-nginx-${GITHUB_RUN_ID}.txt"
          if sudo -n nginx -T > "$config" 2>/dev/null; then
            echo 'NGINX_CONFIG_TEST=ok' | tee -a "$report"
          else
            echo 'NGINX_CONFIG_TEST=failed' | tee -a "$report"
            exit 1
          fi

          NGINX_CONFIG_FILE="$config" node <<'NODE' | tee -a "$report"
          const fs = require('node:fs');
          const source = fs.readFileSync(process.env.NGINX_CONFIG_FILE, 'utf8');
          const normalized = source.replace(/#[^\n]*/g, ' ');

          function directives(name) {
            const pattern = new RegExp(`(?:^|\\n)\\s*${name}\\s+([^;]+);`, 'gi');
            return [...normalized.matchAll(pattern)].map(match => match[1].trim());
          }

          function proxyHeader(name) {
            const pattern = new RegExp(`(?:^|\\n)\\s*proxy_set_header\\s+${name}\\s+([^;]+);`, 'gi');
            return [...normalized.matchAll(pattern)].map(match => match[1].trim());
          }

          function classify(values, expected) {
            if (!values.length) return 'missing';
            if (values.every(value => value === expected)) return 'expected';
            if (values.some(value => value === expected)) return 'mixed';
            return 'other';
          }

          function classifyCf(values) {
            if (!values.length) return 'missing';
            const classes = new Set(values.map(value => {
              if (value === '$remote_addr') return 'remote_addr';
              if (value === '$proxy_protocol_addr') return 'proxy_protocol';
              if (value === '""' || value === "''") return 'cleared';
              if (/\$http_cf_connecting_ip/i.test(value)) return 'passthrough';
              return 'other';
            }));
            return classes.size === 1 ? [...classes][0] : 'mixed';
          }

          const serverNameFanMind = /server_name\s+[^;]*(?:^|\s)(?:www\.)?fanmind\.ch(?:\s|;)/im.test(normalized);
          const proxyPassApp = /proxy_pass\s+https?:\/\/(?:127\.0\.0\.1|localhost):3000(?:\/|;)/i.test(normalized);
          const hostHeaders = proxyHeader('Host');
          const realIpHeaders = proxyHeader('X-Real-IP');
          const forwardedHeaders = proxyHeader('X-Forwarded-For');
          const forwardedProtoHeaders = proxyHeader('X-Forwarded-Proto');
          const cfHeaders = proxyHeader('CF-Connecting-IP');
          const realIpHeaderDirectives = directives('real_ip_header');
          const setRealIpFrom = directives('set_real_ip_from');
          const recursive = directives('real_ip_recursive');
          const listenProxyProtocol = /listen\s+[^;]*\bproxy_protocol\b/i.test(normalized);

          let realIpHeaderMode = 'missing';
          if (realIpHeaderDirectives.length) {
            const modes = new Set(realIpHeaderDirectives.map(value => {
              if (/^CF-Connecting-IP$/i.test(value)) return 'cloudflare';
              if (/^X-Forwarded-For$/i.test(value)) return 'x_forwarded_for';
              if (/^proxy_protocol$/i.test(value)) return 'proxy_protocol';
              return 'other';
            }));
            realIpHeaderMode = modes.size === 1 ? [...modes][0] : 'mixed';
          }

          console.log(`NGINX_FANMIND_SERVER_BLOCK=${serverNameFanMind ? 'present' : 'missing'}`);
          console.log(`NGINX_APP_PROXY_3000=${proxyPassApp ? 'present' : 'missing'}`);
          console.log(`PROXY_HEADER_HOST=${classify(hostHeaders, '$host')}`);
          console.log(`PROXY_HEADER_X_REAL_IP=${classify(realIpHeaders, '$remote_addr')}`);
          console.log(`PROXY_HEADER_X_FORWARDED_FOR=${classify(forwardedHeaders, '$proxy_add_x_forwarded_for')}`);
          console.log(`PROXY_HEADER_X_FORWARDED_PROTO=${classify(forwardedProtoHeaders, '$scheme')}`);
          console.log(`PROXY_HEADER_CF_CONNECTING_IP=${classifyCf(cfHeaders)}`);
          console.log(`NGINX_REAL_IP_HEADER_MODE=${realIpHeaderMode}`);
          console.log(`NGINX_SET_REAL_IP_FROM_COUNT=${setRealIpFrom.length}`);
          console.log(`NGINX_REAL_IP_RECURSIVE=${recursive.some(value => /^on$/i.test(value)) ? 'on' : recursive.length ? 'off' : 'missing'}`);
          console.log(`NGINX_LISTEN_PROXY_PROTOCOL=${listenProxyProtocol ? 'yes' : 'no'}`);
          NODE
          rm -f "$config"

      - name: Inspect live security headers without response bodies
        shell: bash
        run: |
          set -euo pipefail
          report="$GITHUB_WORKSPACE/$REPORT_PATH"
          headers="$RUNNER_TEMP/fanmind-live-headers-${GITHUB_RUN_ID}.txt"
          curl -fsSIL --max-time 20 https://fanmind.ch/login > "$headers"

          LIVE_HEADERS_FILE="$headers" node <<'NODE' | tee -a "$report"
          const fs = require('node:fs');
          const raw = fs.readFileSync(process.env.LIVE_HEADERS_FILE, 'utf8');
          const blocks = raw.split(/\r?\n\r?\n/).filter(Boolean);
          const finalBlock = [...blocks].reverse().find(block => /^HTTP\//im.test(block)) || '';
          const headers = new Map();
          for (const line of finalBlock.split(/\r?\n/).slice(1)) {
            const index = line.indexOf(':');
            if (index < 1) continue;
            const name = line.slice(0, index).trim().toLowerCase();
            const value = line.slice(index + 1).trim();
            headers.set(name, headers.has(name) ? `${headers.get(name)}, ${value}` : value);
          }

          const csp = headers.get('content-security-policy') || '';
          const cspReportOnly = headers.get('content-security-policy-report-only') || '';
          const hsts = headers.get('strict-transport-security') || '';
          const permissions = headers.get('permissions-policy') || '';

          console.log(`LIVE_CSP_ENFORCED=${csp ? 'present' : 'missing'}`);
          console.log(`LIVE_CSP_REPORT_ONLY=${cspReportOnly ? 'present' : 'missing'}`);
          console.log(`LIVE_CSP_FRAME_ANCESTORS_NONE=${/(?:^|;)\s*frame-ancestors\s+'none'(?:;|$)/i.test(`${csp};${cspReportOnly}`) ? 'yes' : 'no'}`);
          console.log(`LIVE_CSP_BASE_URI_RESTRICTED=${/(?:^|;)\s*base-uri\s+(?:'self'|'none')(?:;|$)/i.test(csp) ? 'yes' : 'no'}`);
          console.log(`LIVE_CSP_OBJECT_SRC_NONE=${/(?:^|;)\s*object-src\s+'none'(?:;|$)/i.test(csp) ? 'yes' : 'no'}`);
          console.log(`LIVE_CSP_FORM_ACTION_RESTRICTED=${/(?:^|;)\s*form-action\s+(?:'self'|'none')(?:;|$)/i.test(csp) ? 'yes' : 'no'}`);
          console.log(`LIVE_X_FRAME_OPTIONS_DENY=${/^DENY$/i.test(headers.get('x-frame-options') || '') ? 'yes' : 'no'}`);
          console.log(`LIVE_X_CONTENT_TYPE_OPTIONS_NOSNIFF=${/^nosniff$/i.test(headers.get('x-content-type-options') || '') ? 'yes' : 'no'}`);
          console.log(`LIVE_REFERRER_POLICY_STRICT_ORIGIN=${/^strict-origin-when-cross-origin$/i.test(headers.get('referrer-policy') || '') ? 'yes' : 'no'}`);
          console.log(`LIVE_HSTS_PRESENT=${hsts ? 'yes' : 'no'}`);
          console.log(`LIVE_HSTS_INCLUDE_SUBDOMAINS=${/includeSubDomains/i.test(hsts) ? 'yes' : 'no'}`);
          console.log(`LIVE_PERMISSIONS_CAMERA_DISABLED=${/camera=\(\)/i.test(permissions) ? 'yes' : 'no'}`);
          console.log(`LIVE_PERMISSIONS_MICROPHONE_DISABLED=${/microphone=\(\)/i.test(permissions) ? 'yes' : 'no'}`);
          console.log(`LIVE_PERMISSIONS_GEOLOCATION_DISABLED=${/geolocation=\(\)/i.test(permissions) ? 'yes' : 'no'}`);
          console.log(`LIVE_COOP_SAME_ORIGIN=${/^same-origin$/i.test(headers.get('cross-origin-opener-policy') || '') ? 'yes' : 'no'}`);
          NODE
          rm -f "$headers"

      - name: Inspect PM2 process topology without environment output
        shell: bash
        run: |
          set -euo pipefail
          report="$GITHUB_WORKSPACE/$REPORT_PATH"
          pm2 jlist | node <<'NODE' | tee -a "$report"
          let input = '';
          process.stdin.on('data', chunk => input += chunk);
          process.stdin.on('end', () => {
            const rows = JSON.parse(input);
            const matches = rows.filter(row => row?.name === 'fanmind');
            const modes = [...new Set(matches.map(row => row?.pm2_env?.exec_mode || 'unknown'))];
            const online = matches.filter(row => row?.pm2_env?.status === 'online').length;
            console.log(`PM2_FANMIND_PROCESS_COUNT=${matches.length}`);
            console.log(`PM2_FANMIND_ONLINE_COUNT=${online}`);
            console.log(`PM2_FANMIND_EXEC_MODE=${modes.length === 1 ? modes[0] : 'mixed'}`);
            console.log(`PM2_MULTI_PROCESS=${matches.length > 1 ? 'yes' : 'no'}`);
            if (!matches.length || online !== matches.length) process.exitCode = 1;
          });
          NODE

      - name: Upload sanitized runtime security audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fanmind-p1-security-runtime-readonly-audit
          path: fanmind-p1-security-runtime-readonly-audit.txt
          if-no-files-found: error
          retention-days: 7
