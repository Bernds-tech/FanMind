name: FanMind P0 Mobile Lock Regenerate

on:
  push:
    branches:
      - p0/completion-20260722
    paths:
      - ".github/workflows/p0-mobile-lock-regenerate.yml"

permissions:
  contents: write

jobs:
  regenerate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout P0 branch
        uses: actions/checkout@v4
        with:
          ref: p0/completion-20260722
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.1

      - name: Regenerate Mobile package lock from package.json
        working-directory: apps/mobile
        run: |
          rm -f package-lock.json
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          npm ci --ignore-scripts --no-audit --no-fund

      - name: Commit regenerated lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git diff --check
          git add apps/mobile/package-lock.json
          git diff --cached --quiet && { echo "Lockfile did not change" >&2; exit 1; }
          git commit -m "Regenerate consistent Mobile dependency lockfile"
          git push origin HEAD:p0/completion-20260722
