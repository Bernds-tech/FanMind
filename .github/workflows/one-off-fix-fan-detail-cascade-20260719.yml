name: One-off fix fan detail cascade 20260719

on:
  push:
    branches:
      - fix/fan-detail-sticky-layout-20260719

permissions:
  contents: write

jobs:
  fix-cascade:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_APP_URL: https://fanmind.ch
      NEXT_PUBLIC_SITE_URL: https://fanmind.ch
      FANMIND_PUBLIC_DEMO_ENABLED: false
      FANMIND_ENABLE_REFERRAL_BILLING: false
      FANMIND_ENABLE_TELEGRAM_SEND: false
      FANMIND_ADMIN_EMAILS: admin@example.com
    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: fix/fan-detail-sticky-layout-20260719
          fetch-depth: 0

      - name: Fix final CSS cascade and strengthen regression test
        run: |
          python3 - <<'PY'
          from pathlib import Path

          css_path = Path('src/app/fans/[id]/fan-detail.module.css')
          css = css_path.read_text(encoding='utf-8')

          early_sticky = '''
          .copilot {
            position: sticky;
            top: 0;
            align-self: start;
            max-height: calc(100dvh - 94px);
            overflow-x: hidden;
            overflow-y: auto;
            overscroll-behavior: contain;
            scrollbar-width: thin;
          }
          '''
          if css.count(early_sticky) != 1:
              raise SystemExit(f'early sticky count={css.count(early_sticky)}')
          css = css.replace(early_sticky, '\n', 1)

          early_reset = '''
            .copilot {
              position: static;
              max-height: none;
              overflow: visible;
            }
          '''
          if css.count(early_reset) != 1:
              raise SystemExit(f'early responsive reset count={css.count(early_reset)}')
          css = css.replace(early_reset, '\n', 1)

          old_final = '''.copilot {
            position: static;
            align-content: start;
          }
          '''
          new_final = '''.copilot {
            position: sticky;
            top: 0;
            align-self: start;
            align-content: start;
            max-height: calc(100dvh - 94px);
            overflow-x: hidden;
            overflow-y: auto;
            overscroll-behavior: contain;
            scrollbar-width: thin;
          }
          '''
          if css.count(old_final) != 1:
              raise SystemExit(f'final copilot count={css.count(old_final)}')
          css = css.replace(old_final, new_final, 1)

          old_breakpoint = '''@media (max-width: 1240px) {
            .workbenchGrid {
              grid-template-columns: 1fr;
            }
          }
          '''
          new_breakpoint = '''@media (max-width: 1240px) {
            .workbenchGrid {
              grid-template-columns: 1fr;
            }

            .copilot {
              position: static;
              max-height: none;
              overflow: visible;
            }
          }
          '''
          if css.count(old_breakpoint) != 1:
              raise SystemExit(f'1240 breakpoint count={css.count(old_breakpoint)}')
          css = css.replace(old_breakpoint, new_breakpoint, 1)
          css_path.write_text(css, encoding='utf-8')

          test_path = Path('tests/fan-detail-layout-policy.test.mjs')
          test_path.write_text('''import assert from "node:assert/strict";\nimport test from "node:test";\nimport { readFile } from "node:fs/promises";\n\nconst cssPath = "src/app/fans/[id]/fan-detail.module.css";\n\ntest("fan detail AI composer stays in normal flow and cannot overlap the message timeline", async () => {\n  const css = await readFile(cssPath, "utf8");\n  const replyRule = css.match(/\\.replyCard\\s*\\{([^}]*)\\}/u)?.[1] ?? "";\n\n  assert.match(replyRule, /position:\\s*static/u);\n  assert.doesNotMatch(replyRule, /position:\\s*(?:sticky|fixed|absolute)/u);\n  assert.doesNotMatch(replyRule, /bottom:/u);\n});\n\ntest("the final desktop copilot rule is sticky and the single-column breakpoint resets it", async () => {\n  const css = await readFile(cssPath, "utf8");\n  const productionLayout = css.indexOf("/* Fan detail production layout");\n  const stickyRule = css.indexOf(".copilot {\\n  position: sticky;", productionLayout);\n  const responsiveReset = css.indexOf("@media (max-width: 1240px)", stickyRule);\n\n  assert.notEqual(productionLayout, -1);\n  assert.ok(stickyRule > productionLayout);\n  assert.ok(responsiveReset > stickyRule);\n  assert.match(css.slice(stickyRule, responsiveReset), /top:\\s*0;[\\s\\S]*?align-self:\\s*start;[\\s\\S]*?max-height:\\s*calc\\(100dvh - 94px\\);[\\s\\S]*?overflow-y:\\s*auto;/u);\n  assert.match(css.slice(responsiveReset), /\\.copilot\\s*\\{[\\s\\S]*?position:\\s*static;[\\s\\S]*?max-height:\\s*none;[\\s\\S]*?overflow:\\s*visible;/u);\n  assert.doesNotMatch(css.slice(stickyRule, responsiveReset), /position:\\s*static/u);\n});\n''', encoding='utf-8')
          PY

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Verify product truth
        run: npm run verify:truth

      - name: Lint
        run: npm run lint

      - name: Operations tests
        run: npm run test:operations

      - name: Production build
        run: npm run build

      - name: Commit fix and remove temporary files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/one-off-fix-fan-detail-cascade-20260719.yml
          git rm -f .github/fan-detail-cascade-trigger.txt || true
          git add src/app/fans/[id]/fan-detail.module.css tests/fan-detail-layout-policy.test.mjs
          git commit -m "Fix final fan detail sticky rail cascade"
          git push origin HEAD:fix/fan-detail-sticky-layout-20260719
