name: One-off referral terms 20260718

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write
  pull-requests: write

jobs:
  apply:
    if: github.head_ref == 'feat/referral-participation-terms-20260718' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/referral-participation-terms-20260718
          fetch-depth: 0
          persist-credentials: true

      - name: Apply referral participation terms
        id: apply
        shell: bash
        run: |
          set +e
          python3 scripts/one-off/apply-referral-terms-20260718.py > /tmp/referral-terms.log 2>&1
          status=$?
          cat /tmp/referral-terms.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Report failure
        if: steps.apply.outputs.status != '0'
        shell: bash
        run: |
          {
            echo '## Referral terms integration failed'
            echo
            echo '```text'
            tail -n 200 /tmp/referral-terms.log
            echo '```'
          } > /tmp/referral-terms-comment.md
          gh pr comment "$GITHUB_EVENT_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file /tmp/referral-terms-comment.md

      - name: Stop after failure
        if: steps.apply.outputs.status != '0'
        run: exit 1

      - name: Validate patch
        run: git diff --check

      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/app/settings/referral/page.tsx \
            src/app/landing-v2/page.tsx \
            scripts/smoke-public-routes.mjs \
            scripts/verify-product-truth.mjs \
            README.md \
            docs/SOURCE_OF_TRUTH.md \
            docs/REFERRAL_PROGRAM.md
          if git diff --cached --quiet; then
            echo "No generated changes."
            exit 0
          fi
          git commit -m "feat: integrate referral participation terms"
          git push origin HEAD:feat/referral-participation-terms-20260718
