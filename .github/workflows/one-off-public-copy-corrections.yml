name: One-off public copy corrections

on:
  pull_request:
    branches:
      - main
    types:
      - ready_for_review

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  apply:
    if: github.head_ref == 'fix/public-copy-logo-truth-20260713'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: fix/public-copy-logo-truth-20260713
          fetch-depth: 0
          persist-credentials: true

      - name: Apply corrective terminology codemod
        id: codemod
        shell: bash
        run: |
          set +e
          python3 scripts/one-off/public-copy-corrections.py > /tmp/public-copy-corrections.log 2>&1
          status=$?
          cat /tmp/public-copy-corrections.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Report correction failure
        if: steps.codemod.outputs.status != '0'
        shell: bash
        run: |
          {
            echo '## Public-copy-Korrektur fehlgeschlagen'
            echo
            echo '```text'
            tail -n 120 /tmp/public-copy-corrections.log
            echo '```'
          } > /tmp/public-copy-corrections-comment.md
          gh pr comment 563 --repo "$GITHUB_REPOSITORY" --body-file /tmp/public-copy-corrections-comment.md
          exit 1

      - name: Validate patch
        run: |
          git diff --check
          git status --short

      - name: Commit corrections and remove helpers
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            src/app/landing-v2/page.tsx \
            src/app/landing-v2/landing-v2.module.css \
            src/lib/fanmindCopy.ts \
            scripts/verify-product-truth.mjs

          git rm \
            .github/workflows/one-off-public-copy-corrections.yml \
            scripts/one-off/public-copy-corrections.py

          git commit -m "fix: align landing copy identifiers and translations"
          git push origin HEAD:fix/public-copy-logo-truth-20260713
