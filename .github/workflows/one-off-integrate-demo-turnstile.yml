name: One-off public demo Turnstile integration

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  apply:
    if: github.head_ref == 'feat/public-demo-turnstile-20260715' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout Turnstile branch
        uses: actions/checkout@v4
        with:
          ref: feat/public-demo-turnstile-20260715
          fetch-depth: 0
          persist-credentials: true

      - name: Apply Turnstile integration
        id: apply
        shell: bash
        run: |
          set +e
          python3 scripts/one-off/prepare-demo-turnstile-integration.py > /tmp/turnstile-integration.log 2>&1
          prepare_status=$?
          if [ "$prepare_status" = "0" ]; then
            python3 scripts/one-off/integrate-demo-turnstile.py >> /tmp/turnstile-integration.log 2>&1
            status=$?
          else
            status=$prepare_status
          fi
          cat /tmp/turnstile-integration.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Report Turnstile integration failure
        if: steps.apply.outputs.status != '0'
        shell: bash
        run: |
          {
            echo '## Demo-Turnstile-Integration fehlgeschlagen'
            echo
            echo '```text'
            tail -n 160 /tmp/turnstile-integration.log
            echo '```'
          } > /tmp/turnstile-integration-comment.md
          gh pr comment 570 --repo "$GITHUB_REPOSITORY" --body-file /tmp/turnstile-integration-comment.md

      - name: Stop after reported integration failure
        if: steps.apply.outputs.status != '0'
        run: exit 1

      - name: Validate generated patch
        id: validate
        shell: bash
        run: |
          set +e
          git diff --check > /tmp/turnstile-validation.log 2>&1
          status=$?
          git status --short >> /tmp/turnstile-validation.log
          cat /tmp/turnstile-validation.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Report Turnstile patch validation failure
        if: steps.validate.outputs.status != '0'
        shell: bash
        run: |
          {
            echo '## Demo-Turnstile-Patch enthält Formatfehler'
            echo
            echo '```text'
            tail -n 160 /tmp/turnstile-validation.log
            echo '```'
          } > /tmp/turnstile-validation-comment.md
          gh pr comment 570 --repo "$GITHUB_REPOSITORY" --body-file /tmp/turnstile-validation-comment.md

      - name: Stop after reported validation failure
        if: steps.validate.outputs.status != '0'
        run: exit 1

      - name: Commit generated source changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            .env.example \
            package.json \
            docs/operations/public-demo-protection-runbook.md \
            scripts/verify-product-truth.mjs \
            src/app/login/page.tsx \
            src/lib/demoProtection.ts \
            src/lib/demoTurnstilePolicy.mjs \
            src/components/DemoTurnstile.tsx \
            src/components/DemoTurnstile.module.css \
            tests/demo-turnstile-policy.test.mjs

          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi

          git commit -m "feat: add fail-closed Turnstile protection to public demo"
          git push origin HEAD:feat/public-demo-turnstile-20260715
