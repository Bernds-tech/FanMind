name: FanMind P1 Fix setup-node Immutable Pin

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/p1-fix-setup-node-pin-20260723.yml"

concurrency:
  group: fanmind-p1-fix-setup-node-pin-20260723
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  patch:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'p1/supply-chain-hardening-20260723' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout trusted branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: p1/supply-chain-hardening-20260723
          fetch-depth: 1
          show-progress: false

      - name: Replace invalid setup-node reference everywhere
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          old = "actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4"
          new = "actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0"
          roots = [Path('.github/workflows'), Path('docs/security/SUPPLY_CHAIN.md')]
          changed = []
          for root in roots:
              paths = [root] if root.is_file() else sorted(root.glob('*.y*ml'))
              for path in paths:
                  source = path.read_text(encoding='utf-8')
                  updated = source.replace(old, new)
                  if updated != source:
                      path.write_text(updated, encoding='utf-8')
                      changed.append(str(path))
          if not changed:
              raise SystemExit('setup_node_pin_anchor_not_found')
          for path in Path('.github/workflows').glob('*.y*ml'):
              if 'actions/setup-node@49933' in path.read_text(encoding='utf-8'):
                  raise SystemExit(f'stale_setup_node_pin:{path}')
          print(f'SETUP_NODE_PIN_UPDATED_FILES={len(changed)}')
          PY
          git diff --check

      - name: Commit corrected setup-node pin
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows docs/security/SUPPLY_CHAIN.md
          git diff --cached --quiet && { echo "No setup-node pin changes" >&2; exit 1; }
          git commit -m "Use immutable setup-node v6.4.0 commit"
          git push origin HEAD:p1/supply-chain-hardening-20260723
