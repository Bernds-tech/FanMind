name: One-off debug English landing 20260719

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-24.04
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
      FANMIND_PUBLIC_DEMO_ENABLED: false
      FANMIND_ENABLE_REFERRAL_BILLING: false
      FANMIND_ENABLE_TELEGRAM_SEND: false
      FANMIND_ADMIN_EMAILS: admin@example.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - name: Apply localization wiring in workspace
        run: |
          python3 - <<'PY'
          from pathlib import Path

          copy_path = Path('src/lib/fanmindCopy.ts')
          copy_text = copy_path.read_text(encoding='utf-8')
          import_line = 'import { landingEnglishCopy } from "./landingEnglishCopy";'
          anchor = 'export type FanMindLanguage = "de" | "en";'
          if import_line not in copy_text:
              copy_text = copy_text.replace(anchor, f'{import_line}\n\n{anchor}', 1)
          copy_text = copy_text.replace(
              'const englishCopy: Record<string, string> = {',
              'const baseEnglishCopy: Record<string, string> = {',
              1,
          )
          if '...landingEnglishCopy,' not in copy_text:
              marker = '\n};\n\nexport function createFanMindTranslator(language: FanMindLanguage) {'
              replacement = '\n};\n\nconst englishCopy: Record<string, string> = {\n  ...baseEnglishCopy,\n  ...landingEnglishCopy,\n};\n\nexport function createFanMindTranslator(language: FanMindLanguage) {'
              copy_text = copy_text.replace(marker, replacement, 1)
          copy_path.write_text(copy_text, encoding='utf-8')

          page_path = Path('src/app/landing-v2/page.tsx')
          page_text = page_path.read_text(encoding='utf-8')
          if 'export async function generateMetadata' not in page_text:
              old = '''export const metadata: Metadata = {
  title: "FanMind | KI-CRM für Creator, Clubs und Events",
  description:
    "FanMind bündelt Kontakte, Gespräche, Kontaktwissen und Follow-ups für smarte Fan-Beziehungen; externe Integrationen bleiben bis zur technischen und rechtlichen Freigabe klar als Coming Soon markiert.",
};'''
              new = '''type LandingMetadataProps = {
  searchParams?: Promise<{ lang?: string | string[] }>;
};

export async function generateMetadata({ searchParams }: LandingMetadataProps): Promise<Metadata> {
  const params = await searchParams;
  const language = getFanMindLanguage(params?.lang);
  return language === "en"
    ? {
        title: "FanMind | AI CRM for creators, clubs and events",
        description: "FanMind brings contacts, conversations, contact knowledge and follow-ups together for smarter fan relationships. External integrations remain clearly marked as coming soon until technical and legal approval.",
      }
    : {
        title: "FanMind | KI-CRM für Creator, Clubs und Events",
        description: "FanMind bündelt Kontakte, Gespräche, Kontaktwissen und Follow-ups für smarte Fan-Beziehungen; externe Integrationen bleiben bis zur technischen und rechtlichen Freigabe klar als Coming Soon markiert.",
      };
}'''
              page_text = page_text.replace(old, new, 1)
          page_path.write_text(page_text, encoding='utf-8')
          PY
      - run: npm ci --no-audit --no-fund
      - run: npm run verify:truth
      - run: npm run lint
      - run: npm run test:operations
      - run: npm run build
      - name: Start and audit English page
        run: |
          FANMIND_RELEASE_COMMIT="$(git rev-parse HEAD)" npm start > /tmp/fanmind-en-debug.log 2>&1 &
          APP_PID=$!
          trap 'kill "$APP_PID" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 30); do
            if curl -fsS 'http://127.0.0.1:3000/?lang=en' -o /tmp/fanmind-en.html; then
              break
            fi
            sleep 2
          done
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import re
          class P(HTMLParser):
              def __init__(self):
                  super().__init__(); self.skip=0; self.nodes=[]
              def handle_starttag(self, tag, attrs):
                  if tag in {'script','style','svg'}: self.skip += 1
              def handle_endtag(self, tag):
                  if tag in {'script','style','svg'} and self.skip: self.skip -= 1
              def handle_data(self, data):
                  if not self.skip:
                      v=' '.join(data.split())
                      if v: self.nodes.append(v)
          p=P(); p.feed(Path('/tmp/fanmind-en.html').read_text(encoding='utf-8'))
          markers=re.compile(r'[äöüÄÖÜß]|\b(?:dein|deine|für|und|heute|kostenlos|testen|kontakte|kontakt|manuell|manuelle|nächste|vorschlag|verfügbar|keine|kein|kampagnen|nachrichten|erinnerungen|prüfung|freigabe|beispieldaten|monat|kündbar|einrichtung|aktiv|bereit|inaktiv|später|auswertung|übersicht|interessen|historie|speichern|vorbereiten|senden|versand|wachstumssignale)\b', re.I)
          seen=[]
          for node in p.nodes:
              if markers.search(node) and node not in seen: seen.append(node)
          print(f'GERMAN_NODE_COUNT={len(seen)}')
          for i,node in enumerate(seen,1): print(f'GERMAN_NODE_{i:03d}={node}')
          PY
