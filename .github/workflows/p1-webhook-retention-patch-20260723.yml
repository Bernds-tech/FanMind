name: FanMind P1 Webhook Retention Patch

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/p1-webhook-retention-patch-20260723.yml"
      - "scripts/security/webhook-retention-patch-temp.py"

concurrency:
  group: fanmind-p1-webhook-retention-patch-20260723
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  patch:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'p1/webhook-log-retention-20260723' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout trusted branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: p1/webhook-log-retention-20260723
          fetch-depth: 1
          show-progress: false

      - name: Apply reviewed diagnostic minimization patch
        id: patch
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/security/webhook-retention-patch-temp.py 2>&1 | tee webhook-retention-patch-report.txt
          status=${PIPESTATUS[0]}
          if [ "$status" = "0" ]; then
            git diff --check 2>&1 | tee -a webhook-retention-patch-report.txt
            status=${PIPESTATUS[0]}
          fi
          exit "$status"

      - name: Upload bounded patch report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fanmind-webhook-retention-patch-report
          path: webhook-retention-patch-report.txt
          if-no-files-found: error
          retention-days: 3

      - name: Enforce patch result
        if: steps.patch.outcome != 'success'
        run: exit 1

      - name: Commit minimized webhook diagnostics
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/metaWebhook.ts src/lib/supabase/server.ts
          git diff --cached --quiet && { echo "Webhook patch produced no changes" >&2; exit 1; }
          git commit -m "Minimize persisted webhook diagnostics"
          git push origin HEAD:p1/webhook-log-retention-20260723
