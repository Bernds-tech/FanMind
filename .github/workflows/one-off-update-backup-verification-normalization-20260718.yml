name: One-off update backup verification normalization 20260718

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feat/safe-backup-verification-job-20260718' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/safe-backup-verification-job-20260718
      - name: Update normalization test
        run: python3 scripts/one-off/update-backup-verification-normalization-test-20260718.py
      - name: Commit updated test
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/backup-worker.test.mjs
          git diff --cached --quiet && exit 0
          git commit -m "Update verification normalization guard"
          git push origin HEAD:feat/safe-backup-verification-job-20260718
