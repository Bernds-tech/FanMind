name: FanMind P0 Web Follow-up Patch

on:
  push:
    branches:
      - p0/completion-20260722
    paths:
      - "scripts/p0-followup-web-patch.mjs"
      - ".github/workflows/p0-followup-web-patch.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout P0 branch
        uses: actions/checkout@v4
        with:
          ref: p0/completion-20260722
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.1

      - name: Apply guarded follow-up patch
        run: node scripts/p0-followup-web-patch.mjs

      - name: Validate patch
        run: |
          git diff --check
          grep -F 'isOpenFollowupStatus(followup.status)' 'src/app/fans/[id]/page.tsx'
          ! grep -F 'followup.status !== "done"' 'src/app/fans/[id]/page.tsx'

      - name: Commit patched source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 'src/app/fans/[id]/page.tsx'
          git commit -m "Use canonical follow-up completion predicate in Web"
          git push origin HEAD:p0/completion-20260722
