name: FanMind P1 Dispatch Main Uptime Monitor

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/ops-dispatch-uptime-monitor-20260723.yml"

permissions:
  contents: read
  actions: write

concurrency:
  group: fanmind-p1-dispatch-main-uptime-monitor
  cancel-in-progress: true

jobs:
  dispatch:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'ops/dispatch-uptime-monitor-20260723'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
      REPORT_PATH: fanmind-main-uptime-manual-dispatch.txt
    steps:
      - name: Dispatch workflow on main and wait for completion
        shell: bash
        run: |
          set -euo pipefail
          report="$REPORT_PATH"
          : > "$report"

          before_id="$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow uptime-fanmind.yml \
            --branch main \
            --event workflow_dispatch \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId // 0')"

          printf 'DISPATCH_UTC=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" | tee -a "$report"
          printf 'PREVIOUS_MANUAL_RUN_ID=%s\n' "$before_id" | tee -a "$report"

          gh workflow run uptime-fanmind.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main
          echo 'WORKFLOW_DISPATCH_REQUEST=accepted' | tee -a "$report"

          run_id=""
          for attempt in $(seq 1 60); do
            run_id="$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow uptime-fanmind.yml \
              --branch main \
              --event workflow_dispatch \
              --limit 10 \
              --json databaseId \
              --jq ".[] | select(.databaseId != $before_id) | .databaseId" \
              | head -n 1)"
            if [[ -n "$run_id" ]]; then
              printf 'MANUAL_RUN_DISCOVERY_ATTEMPT=%s\n' "$attempt" | tee -a "$report"
              break
            fi
            sleep 2
          done

          if [[ -z "$run_id" ]]; then
            echo 'MANUAL_RUN_DISCOVERY=failed' | tee -a "$report"
            exit 1
          fi

          printf 'MANUAL_RUN_ID=%s\n' "$run_id" | tee -a "$report"
          gh run watch "$run_id" \
            --repo "$GITHUB_REPOSITORY" \
            --exit-status

          gh run view "$run_id" \
            --repo "$GITHUB_REPOSITORY" \
            --json databaseId,workflowName,event,headBranch,headSha,status,conclusion,url \
            --jq '"MANUAL_RUN_WORKFLOW=" + .workflowName,
                  "MANUAL_RUN_EVENT=" + .event,
                  "MANUAL_RUN_BRANCH=" + .headBranch,
                  "MANUAL_RUN_HEAD_SHA=" + .headSha,
                  "MANUAL_RUN_STATUS=" + .status,
                  "MANUAL_RUN_CONCLUSION=" + .conclusion,
                  "MANUAL_RUN_URL=" + .url' \
            | tee -a "$report"

          conclusion="$(gh run view "$run_id" \
            --repo "$GITHUB_REPOSITORY" \
            --json conclusion \
            --jq '.conclusion')"
          if [[ "$conclusion" != "success" ]]; then
            echo 'MANUAL_UPTIME_RESULT=failed' | tee -a "$report"
            exit 1
          fi

          echo 'MANUAL_UPTIME_RESULT=success' | tee -a "$report"

      - name: Upload dispatch evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fanmind-main-uptime-manual-dispatch
          path: fanmind-main-uptime-manual-dispatch.txt
          if-no-files-found: error
          retention-days: 7
