name: One-off isolated release hardening 20260718

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feat/opt-in-isolated-release-deploy-20260718' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/opt-in-isolated-release-deploy-20260718
          fetch-depth: 0
          persist-credentials: true
      - run: python3 scripts/one-off/harden-isolated-release-rollback-20260718.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            scripts/operations/deploy-isolated-release.sh \
            tests/backup-worker.test.mjs \
            tests/isolated-release-deploy.test.mjs
          git commit -m "fix: harden isolated release rollback and legacy restart"
          git push origin HEAD:feat/opt-in-isolated-release-deploy-20260718
