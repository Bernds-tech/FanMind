name: FanMind P1 Apply Shared Rate Limit Migration V2

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/ops-apply-shared-rate-limit-migration-v2-20260723.yml"
      - "scripts/operations/shared-rate-limit-migration-temp-20260723.mjs"

concurrency:
  group: fanmind-p1-apply-shared-rate-limit-migration-20260723
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  migrate:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'ops/apply-shared-rate-limit-migration-20260723'
    runs-on:
      - self-hosted
      - fanmind-prod
      - exoscale
      - linux
      - x64
    timeout-minutes: 35
    env:
      EXPECTED_RELEASE: cff00dcd80995794fe87895706c9fbec992687ea
      REPORT_PATH: fanmind-shared-rate-limit-migration-report.txt

    steps:
      - name: Checkout trusted migration branch
        uses: actions/checkout@v4
        with:
          ref: ops/apply-shared-rate-limit-migration-20260723
          fetch-depth: 1

      - name: Create fresh backup, apply migration and verify atomically
        shell: bash
        run: |
          set -euo pipefail
          report="$GITHUB_WORKSPACE/$REPORT_PATH"
          sudo -n env \
            GITHUB_WORKSPACE="$GITHUB_WORKSPACE" \
            GITHUB_RUN_ID="$GITHUB_RUN_ID" \
            EXPECTED_RELEASE="$EXPECTED_RELEASE" \
            /usr/bin/node \
            "$GITHUB_WORKSPACE/scripts/operations/shared-rate-limit-migration-temp-20260723.mjs" \
            "$report"

      - name: Upload sanitized migration evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fanmind-shared-rate-limit-migration-report
          path: fanmind-shared-rate-limit-migration-report.txt
          if-no-files-found: error
          retention-days: 14
