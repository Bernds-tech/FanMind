name: One-off referral diagnostics

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  diagnose:
    if: github.head_ref == 'test/referral-policy-guardrails-20260713'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_APP_URL: https://fanmind.ch
      NEXT_PUBLIC_SITE_URL: https://fanmind.ch
      FANMIND_PUBLIC_DEMO_ENABLED: "false"
      FANMIND_ENABLE_REFERRAL_BILLING: "false"
      FANMIND_ENABLE_TELEGRAM_SEND: "false"
      FANMIND_ADMIN_EMAILS: admin@example.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Run diagnostics
        id: checks
        shell: bash
        run: |
          set +e
          npm run verify:truth > /tmp/truth.log 2>&1
          truth=$?
          npm run lint > /tmp/lint.log 2>&1
          lint=$?
          npm run test:operations > /tmp/tests.log 2>&1
          tests=$?
          npm run build > /tmp/build.log 2>&1
          build=$?
          echo "truth=$truth" >> "$GITHUB_OUTPUT"
          echo "lint=$lint" >> "$GITHUB_OUTPUT"
          echo "tests=$tests" >> "$GITHUB_OUTPUT"
          echo "build=$build" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Report diagnostics
        shell: bash
        run: |
          {
            echo '## Referral-PR Diagnostik'
            echo
            echo "- truth: ${{ steps.checks.outputs.truth }}"
            echo "- lint: ${{ steps.checks.outputs.lint }}"
            echo "- tests: ${{ steps.checks.outputs.tests }}"
            echo "- build: ${{ steps.checks.outputs.build }}"
            for name in truth lint tests build; do
              status="${{ steps.checks.outputs.truth }}"
              case "$name" in
                lint) status="${{ steps.checks.outputs.lint }}" ;;
                tests) status="${{ steps.checks.outputs.tests }}" ;;
                build) status="${{ steps.checks.outputs.build }}" ;;
              esac
              if [ "$status" != "0" ]; then
                echo
                echo "### $name"
                echo '```text'
                tail -n 120 "/tmp/$name.log"
                echo '```'
              fi
            done
          } > /tmp/referral-diagnostics.md
          gh pr comment 566 --repo "$GITHUB_REPOSITORY" --body-file /tmp/referral-diagnostics.md

      - name: Fail when any diagnostic failed
        if: >-
          steps.checks.outputs.truth != '0' ||
          steps.checks.outputs.lint != '0' ||
          steps.checks.outputs.tests != '0' ||
          steps.checks.outputs.build != '0'
        run: exit 1
