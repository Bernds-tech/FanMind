name: One-off shared function icon integration

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  apply:
    if: github.head_ref == 'fix/unified-function-icons-20260715' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout icon branch
        uses: actions/checkout@v4
        with:
          ref: fix/unified-function-icons-20260715
          fetch-depth: 0
          persist-credentials: true

      - name: Apply shared function icon integration
        id: apply
        shell: bash
        run: |
          set +e
          python3 scripts/one-off/prepare-unify-function-icons.py > /tmp/icon-integration.log 2>&1
          prepare_status=$?
          if [ "$prepare_status" = "0" ]; then
            python3 scripts/one-off/unify-function-icons.py >> /tmp/icon-integration.log 2>&1
            status=$?
          else
            status=$prepare_status
          fi
          cat /tmp/icon-integration.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Report icon integration failure
        if: steps.apply.outputs.status != '0'
        shell: bash
        run: |
          {
            echo '## Funktionssymbol-Integration fehlgeschlagen'
            echo
            echo '```text'
            tail -n 120 /tmp/icon-integration.log
            echo '```'
          } > /tmp/icon-integration-comment.md
          gh pr comment 568 --repo "$GITHUB_REPOSITORY" --body-file /tmp/icon-integration-comment.md

      - name: Stop after reported integration failure
        if: steps.apply.outputs.status != '0'
        run: exit 1

      - name: Validate generated patch
        id: validate
        shell: bash
        run: |
          set +e
          git diff --check > /tmp/icon-validation.log 2>&1
          status=$?
          git status --short >> /tmp/icon-validation.log
          cat /tmp/icon-validation.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Report icon patch validation failure
        if: steps.validate.outputs.status != '0'
        shell: bash
        run: |
          {
            echo '## Funktionssymbol-Patch enthält Formatfehler'
            echo
            echo '```text'
            tail -n 160 /tmp/icon-validation.log
            echo '```'
          } > /tmp/icon-validation-comment.md
          gh pr comment 568 --repo "$GITHUB_REPOSITORY" --body-file /tmp/icon-validation-comment.md

      - name: Stop after reported validation failure
        if: steps.validate.outputs.status != '0'
        run: exit 1

      - name: Commit generated source changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            src/components/FanMindFunctionIcon.tsx \
            src/components/WorkspaceShell.tsx \
            src/lib/workspaceNavigation.ts \
            src/app/dashboard/dashboard.module.css \
            src/app/landing-v2/page.tsx \
            scripts/verify-product-truth.mjs \
            docs/SOURCE_OF_TRUTH.md

          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi

          git commit -m "fix: unify function icons across landing and workspace"
          git push origin HEAD:fix/unified-function-icons-20260715
