name: One-off server error card 20260718

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feat/privacy-server-error-tracking-20260718' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/privacy-server-error-tracking-20260718
      - name: Add server error groups card
        run: python3 scripts/one-off/add-server-error-groups-card-20260718.py
      - name: Commit generated page change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/admin/operations/page.tsx
          git diff --cached --quiet && exit 0
          git commit -m "Show server error groups in operations center"
          git push origin HEAD:feat/privacy-server-error-tracking-20260718
