name: FanMind P1 Apply Webhook Retention

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/ops-apply-webhook-retention-20260723.yml"
      - "scripts/operations/webhook-retention-production-temp-20260723.mjs"

concurrency:
  group: fanmind-p1-apply-webhook-retention-20260723
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rollout:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'ops/apply-webhook-retention-20260723'
    runs-on:
      - self-hosted
      - fanmind-prod
      - exoscale
      - linux
      - x64
    timeout-minutes: 45
    env:
      EXPECTED_RELEASE: be4ddb644f8d8708dfaa18eaf8ae4064da6b59dd
      REPORT_PATH: fanmind-webhook-retention-production-report.txt

    steps:
      - name: Checkout trusted rollout branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ops/apply-webhook-retention-20260723
          fetch-depth: 1
          show-progress: false

      - name: Apply migration, retention and bounded host log policies
        shell: bash
        run: |
          set -euo pipefail
          report="$GITHUB_WORKSPACE/$REPORT_PATH"
          sudo -n env \
            GITHUB_WORKSPACE="$GITHUB_WORKSPACE" \
            GITHUB_RUN_ID="$GITHUB_RUN_ID" \
            EXPECTED_RELEASE="$EXPECTED_RELEASE" \
            /usr/bin/node \
            "$GITHUB_WORKSPACE/scripts/operations/webhook-retention-production-temp-20260723.mjs" \
            "$report"
          sudo -n chown "$(id -u):$(id -g)" "$report"
          chmod 0600 "$report"

      - name: Upload sanitized rollout evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fanmind-webhook-retention-production-report
          path: fanmind-webhook-retention-production-report.txt
          if-no-files-found: error
          retention-days: 14
