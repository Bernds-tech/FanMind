name: FanMind P1 Meta Pixel CodeQL Fix

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/p1-meta-pixel-codeql-fix-20260724.yml"
      - "scripts/meta-pixel-codeql-fix-temp.mjs"

concurrency:
  group: fanmind-p1-meta-pixel-codeql-fix-20260724
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  patch:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'p1/meta-pixel-consent-20260724' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout trusted Meta Pixel branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: p1/meta-pixel-consent-20260724
          fetch-depth: 1
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Apply bounded CodeQL test fix
        run: |
          set -euo pipefail
          node scripts/meta-pixel-codeql-fix-temp.mjs
          rm -f \
            .github/workflows/p1-meta-pixel-codeql-fix-20260724.yml \
            scripts/meta-pixel-codeql-fix-temp.mjs
          git diff --check

      - name: Commit fixed test and remove one-shot helper
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/meta-pixel-policy.test.mjs .github/workflows scripts
          git diff --cached --quiet && { echo "No Meta Pixel CodeQL test changes" >&2; exit 1; }
          git commit -m "Avoid unanchored URL regex in Meta Pixel policy test"
          git push origin HEAD:p1/meta-pixel-consent-20260724
