name: FanMind P1 Security Client IP CSP Patch

on:
  push:
    branches:
      - p1/security-client-ip-csp-20260723
    paths:
      - ".github/workflows/p1-security-client-ip-csp-patch.yml"

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout trusted branch
        uses: actions/checkout@v4
        with:
          ref: p1/security-client-ip-csp-20260723
          fetch-depth: 1
          show-progress: false

      - name: Route public demo identity through canonical resolver
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('src/lib/demoProtection.ts')
          source = path.read_text(encoding='utf-8')
          import_anchor = 'import { resolveDemoTurnstilePolicy } from "@/lib/demoTurnstilePolicy.mjs";\n'
          import_line = 'import { getTrustedClientIpValue } from "@/lib/clientIpPolicy.mjs";\n'
          if import_line not in source:
              if import_anchor not in source:
                  raise SystemExit('demo_turnstile_import_anchor_missing')
              source = source.replace(import_anchor, import_line + import_anchor, 1)

          old = '''export function getTrustedClientIp(request: NextRequest): string {
            return (
              request.headers.get("cf-connecting-ip")?.trim() ||
              request.headers.get("x-real-ip")?.trim() ||
              request.headers.get("x-forwarded-for")?.split(",")[0]?.trim() ||
              "unknown"
            );
          }
          '''
          new = '''export function getTrustedClientIp(request: NextRequest): string {
            return getTrustedClientIpValue(request.headers, "unknown");
          }
          '''
          if old not in source:
              raise SystemExit('old_demo_client_ip_function_missing')
          path.write_text(source.replace(old, new, 1), encoding='utf-8')
          PY
          git diff --check

      - name: Commit canonical demo client identity
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/demoProtection.ts
          git diff --cached --quiet && { echo "Patch produced no changes" >&2; exit 1; }
          git commit -m "Use canonical client IP for public demo protection"
          git push origin HEAD:p1/security-client-ip-csp-20260723
