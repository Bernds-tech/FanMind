name: FanMind Browser E2E

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: fanmind-browser-e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  public-no-write:
    name: Public no-write flows on desktop and mobile Chromium
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3100
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3100
      NEXT_PUBLIC_META_PIXEL_ID: 2069553844439892
      FANMIND_PUBLIC_DEMO_ENABLED: "false"
      FANMIND_ENABLE_REFERRAL_BILLING: "false"
      FANMIND_ENABLE_TELEGRAM_SEND: "false"
      FANMIND_ADMIN_EMAILS: admin@example.com
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3100
      CI: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.13.1
          cache: npm

      - name: Install dependencies reproducibly
        run: npm ci --no-audit --no-fund

      - name: Build Production-compatible web application
        run: npm run build

      - name: Install Chromium only
        run: npx playwright install --with-deps chromium

      - name: Run no-write public browser flows
        run: npm run test:e2e

      - name: Upload failure-oriented browser evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fanmind-browser-e2e-report
          path: |
            playwright-report
            test-results
          if-no-files-found: warn
          include-hidden-files: false
          retention-days: 7
