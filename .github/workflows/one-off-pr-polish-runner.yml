name: One-off PR polish runner

on:
  issue_comment:
    types:
      - created
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  apply-final-polish:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.issue.number == 562 &&
      github.event.comment.body == '/run-final-polish-20260713-6')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: fix/final-rapid-polish-20260713
          fetch-depth: 0
          persist-credentials: true

      - name: Normalize codemod selectors
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("scripts/one-off/final-rapid-polish.py")
          script = path.read_text(encoding="utf-8")

          landing_old = '    text = replace_once(text, old, new, label=label)\n'
          landing_new = '    text = text.replace(old, new)\n'
          if landing_old not in script:
              raise SystemExit("landing replacement loop not found")
          script = script.replace(landing_old, landing_new, 1)

          block_start = script.find(
              "text = replace_once(\n    text,\n    'forbid(/Fanmind@fanmind"
          )
          if block_start < 0:
              raise SystemExit("truth forbidden-term codemod block not found")
          block_end_marker = '    label="truth forbidden terms",\n)\n'
          block_end = script.find(block_end_marker, block_start)
          if block_end < 0:
              raise SystemExit("truth forbidden-term codemod block end not found")
          block_end += len(block_end_marker)

          robust_truth_block = r'''truth_anchor = r"""forbid(
            /Fanmind@fanmind\.ch/u,
            "Uneinheitliche Anfrageadresse gefunden; nutze kontakt@fanmind.ch.",
          );
          """
          truth_addition = truth_anchor + r"""forbid(
            /hello@fanmind\.ch/iu,
            "Uneinheitliche Kontaktadresse gefunden; nutze kontakt@fanmind.ch.",
          );
          forbid(
            /Ehrliche Roadmap/iu,
            "Öffentliche Roadmap darf nicht als Ehrliche Roadmap bezeichnet werden.",
          );
          forbid(
            /Unified Inbox Timeline/iu,
            "Nicht aktive Inbox-Synchronisierung darf nicht als Unified Inbox bezeichnet werden.",
          );
          """
          if r"/hello@fanmind\.ch/iu" not in text:
              if truth_anchor not in text:
                  raise SystemExit("truth forbidden-term anchor missing")
              text = text.replace(truth_anchor, truth_addition, 1)
          '''

          script = script[:block_start] + robust_truth_block + script[block_end:]
          path.write_text(script, encoding="utf-8")
          PY

      - name: Apply deterministic codemod
        id: codemod
        shell: bash
        run: |
          set +e
          python3 scripts/one-off/final-rapid-polish.py > /tmp/final-polish.log 2>&1
          status=$?
          cat /tmp/final-polish.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Report codemod failure
        if: steps.codemod.outputs.status != '0'
        shell: bash
        run: |
          {
            echo '## One-off-Polish fehlgeschlagen'
            echo
            echo '```text'
            tail -n 80 /tmp/final-polish.log
            echo '```'
          } > /tmp/final-polish-comment.md
          gh pr comment 562 --repo "$GITHUB_REPOSITORY" --body-file /tmp/final-polish-comment.md
          exit 1

      - name: Validate patch shape
        run: |
          git diff --check
          git status --short

      - name: Commit generated changes
        shell: bash
        run: |
          if git diff --quiet; then
            gh pr comment 562 --repo "$GITHUB_REPOSITORY" --body 'One-off-Polish: keine Quellcodeänderung erzeugt.'
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/app/fans/[id]/page.tsx \
            src/app/fans/[id]/fan-detail.module.css \
            src/lib/workspaceCopy.ts \
            src/app/landing-v2/page.tsx \
            src/lib/fanmindCopy.ts \
            src/app/impressum/page.tsx \
            src/app/settings/AccountSections.tsx \
            src/config/roadmap.ts \
            docs/SOURCE_OF_TRUTH.md \
            scripts/verify-product-truth.mjs
          git commit -m "fix: finish visible product polish"
          git push origin HEAD:fix/final-rapid-polish-20260713
          gh pr comment 562 --repo "$GITHUB_REPOSITORY" --body 'One-off-Polish: Quellcodeänderungen wurden erzeugt und auf den PR-Branch gepusht.'
