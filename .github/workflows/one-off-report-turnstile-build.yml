name: One-off Turnstile build diagnostics

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  diagnose:
    if: github.head_ref == 'feat/public-demo-turnstile-20260715' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_APP_URL: https://fanmind.ch
      NEXT_PUBLIC_SITE_URL: https://fanmind.ch
      FANMIND_PUBLIC_DEMO_ENABLED: "false"
      FANMIND_ENABLE_REFERRAL_BILLING: "false"
      FANMIND_ENABLE_TELEGRAM_SEND: "false"
      FANMIND_ADMIN_EMAILS: admin@example.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run production build and capture output
        id: build
        shell: bash
        run: |
          set +e
          npm run build > /tmp/turnstile-build.log 2>&1
          status=$?
          cat /tmp/turnstile-build.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Report build result
        shell: bash
        run: |
          {
            if [ "${{ steps.build.outputs.status }}" = "0" ]; then
              echo '## Turnstile-Build erfolgreich'
            else
              echo '## Turnstile-Build fehlgeschlagen'
            fi
            echo
            echo '```text'
            tail -n 180 /tmp/turnstile-build.log
            echo '```'
          } > /tmp/turnstile-build-comment.md
          gh pr comment 570 --repo "$GITHUB_REPOSITORY" --body-file /tmp/turnstile-build-comment.md

      - name: Fail when build failed
        if: steps.build.outputs.status != '0'
        run: exit 1
