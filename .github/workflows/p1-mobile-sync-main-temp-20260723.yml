name: FanMind P1 Mobile Sync Main Temporary

on:
  push:
    branches:
      - p1/mobile-recovery-contact-crud-20260723
    paths:
      - ".github/workflows/p1-mobile-sync-main-temp-20260723.yml"

concurrency:
  group: fanmind-p1-mobile-sync-main-temp-20260723
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout trusted Mobile branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: p1/mobile-recovery-contact-crud-20260723
          fetch-depth: 0
          show-progress: false

      - name: Merge current main and remove this one-off workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --prune origin main
          git merge --no-ff --no-edit origin/main
          git rm .github/workflows/p1-mobile-sync-main-temp-20260723.yml
          git commit --amend --no-edit
          git push origin HEAD:p1/mobile-recovery-contact-crud-20260723
