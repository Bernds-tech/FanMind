name: FanMind Final Go-Live Readiness

on:
  workflow_run:
    workflows:
      - Deploy FanMind
    types:
      - completed
  workflow_dispatch:
    inputs:
      expected_commit:
        description: Optional erwarteter Production-Commit
        required: false
        type: string

permissions:
  contents: read

jobs:
  public-readiness:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout deployed revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run final public go-live preflight
        env:
          FANMIND_GO_LIVE_BASE_URL: https://fanmind.ch
          FANMIND_EXPECTED_RELEASE_COMMIT: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.expected_commit }}
          FANMIND_GO_LIVE_REPORT_PATH: final-go-live-readiness-report.json
        run: npm run smoke:go-live:public

      - name: Upload readiness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-go-live-readiness-report
          path: final-go-live-readiness-report.json
          if-no-files-found: warn
          retention-days: 14
