name: One-off backup verification worker 20260718

on:
  push:
    branches:
      - feat/safe-backup-verification-job-20260718

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/safe-backup-verification-job-20260718
      - name: Apply worker patch
        run: python3 scripts/one-off/patch-backup-worker-verification-20260718.py
      - name: Validate worker syntax
        run: node --check scripts/operations/backup-worker.mjs
      - name: Commit generated worker
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/operations/backup-worker.mjs
          git diff --cached --quiet && exit 0
          git commit -m "Enable checksum-only backup verification in worker"
          git push origin HEAD:feat/safe-backup-verification-job-20260718
