name: FanMind P1 Staging Boundary Ref Match PR Patch

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/p1-staging-boundary-ref-match-pr-patch.yml"

permissions:
  contents: write

jobs:
  patch:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'p1/staging-boundary-ref-match-20260723' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout trusted internal branch
        uses: actions/checkout@v4
        with:
          ref: p1/staging-boundary-ref-match-20260723
          fetch-depth: 1

      - name: Execute deterministic patch embedded in trusted helper
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import subprocess
          import sys

          helper = Path('.github/workflows/p1-staging-boundary-ref-match-patch.yml')
          lines = helper.read_text(encoding='utf-8').splitlines()
          start = next((index + 1 for index, line in enumerate(lines) if line.strip() == "python - <<'PY'"), None)
          if start is None:
              raise SystemExit('embedded_patch_start_missing')
          end = next((index for index in range(start, len(lines)) if lines[index].strip() == 'PY'), None)
          if end is None:
              raise SystemExit('embedded_patch_end_missing')

          embedded_lines = lines[start:end]
          non_empty = [line for line in embedded_lines if line.strip()]
          if not non_empty:
              raise SystemExit('embedded_patch_empty')
          indent = min(len(line) - len(line.lstrip()) for line in non_empty)
          embedded = '\n'.join(line[indent:] if len(line) >= indent else '' for line in embedded_lines) + '\n'
          patch_path = Path('/tmp/fanmind-staging-boundary-patch.py')
          patch_path.write_text(embedded, encoding='utf-8')
          completed = subprocess.run(
              [sys.executable, str(patch_path)],
              text=True,
              stdout=subprocess.PIPE,
              stderr=subprocess.STDOUT,
          )
          if completed.stdout:
              print(completed.stdout[-4000:])
          if completed.returncode != 0:
              raise SystemExit(completed.returncode)
          PY
          git diff --check

      - name: Commit staging boundary hardening
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/lib/environmentBoundaryPolicy.mjs \
            scripts/environment-boundary-preflight.mjs \
            scripts/staging-readiness-preflight.mjs \
            tests/environment-boundary-policy.test.mjs \
            tests/staging-readiness-policy.test.mjs \
            docs/operations/STAGING_PROVISIONING.md \
            .env.staging.example
          git diff --cached --quiet && { echo "Patch produced no changes" >&2; exit 1; }
          git commit -m "Bind staging Supabase target ref to project URL"
          git push origin HEAD:p1/staging-boundary-ref-match-20260723
