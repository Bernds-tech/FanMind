name: FanMind P1 Staging Boundary Ref Match PR Patch

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/p1-staging-boundary-ref-match-pr-patch.yml"
      - "scripts/operations/staging-boundary-ref-match-patch-temp.py"

permissions:
  contents: write

jobs:
  patch:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'p1/staging-boundary-ref-match-20260723' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout trusted internal branch
        uses: actions/checkout@v4
        with:
          ref: p1/staging-boundary-ref-match-20260723
          fetch-depth: 1
          show-progress: false

      - name: Apply fail-closed staging target binding
        id: patch_run
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python - <<'PY' > staging-boundary-patch.log 2>&1
          from pathlib import Path
          import subprocess
          import sys

          source_path = Path('scripts/operations/staging-boundary-ref-match-patch-temp.py')
          source = source_path.read_text(encoding='utf-8')
          old = '''def block(value: str) -> str:\n    return dedent(value).lstrip("\\n")\n'''
          new = '''def block(value: str) -> str:\n    lines = value.lstrip("\\n").splitlines(keepends=True)\n    return "".join(line[4:] if line.startswith("    ") else line for line in lines)\n'''
          if old not in source:
              raise SystemExit('temporary_patch_block_helper_missing')
          patched_path = Path('/tmp/fanmind-staging-boundary-patch.py')
          patched_path.write_text(source.replace(old, new, 1), encoding='utf-8')
          completed = subprocess.run(
              [sys.executable, str(patched_path)],
              text=True,
              stdout=subprocess.PIPE,
              stderr=subprocess.STDOUT,
          )
          if completed.stdout:
              print(completed.stdout)
          raise SystemExit(completed.returncode)
          PY
          status=$?
          printf '%s\n' "$status" > staging-boundary-patch.status
          tail -n 80 staging-boundary-patch.log || true
          exit "$status"

      - name: Upload bounded patch diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fanmind-staging-boundary-patch-diagnostic
          path: |
            staging-boundary-patch.log
            staging-boundary-patch.status
          if-no-files-found: error
          retention-days: 2

      - name: Commit staging boundary hardening
        if: steps.patch_run.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/lib/environmentBoundaryPolicy.mjs \
            scripts/environment-boundary-preflight.mjs \
            scripts/staging-readiness-preflight.mjs \
            tests/environment-boundary-policy.test.mjs \
            tests/staging-readiness-policy.test.mjs \
            docs/operations/STAGING_PROVISIONING.md \
            .env.staging.example
          git diff --cached --quiet && { echo "Patch produced no changes" >&2; exit 1; }
          git commit -m "Bind staging Supabase target ref to project URL"
          git push origin HEAD:p1/staging-boundary-ref-match-20260723

      - name: Enforce patch result
        if: always()
        shell: bash
        run: test "${{ steps.patch_run.outcome }}" = "success"
