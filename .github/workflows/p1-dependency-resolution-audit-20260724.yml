name: FanMind P1 Dependency Resolution Read-only Audit

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/p1-dependency-resolution-audit-20260724.yml"
      - "scripts/security/dependency-resolution-audit-temp-20260724.mjs"

concurrency:
  group: fanmind-p1-dependency-resolution-audit-20260724
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'audit/p1-dependency-resolution-20260724'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      FANMIND_DEPENDENCY_AUDIT_REPORT: fanmind-dependency-resolution-audit.txt

    steps:
      - name: Checkout trusted audit branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: audit/p1-dependency-resolution-20260724
          fetch-depth: 1
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.13.1
          cache: npm

      - name: Install current dependencies reproducibly
        run: npm ci --no-audit --no-fund

      - name: Query registry and evaluate bounded stable candidates
        shell: bash
        run: |
          set -euo pipefail
          node scripts/security/dependency-resolution-audit-temp-20260724.mjs
          git diff --exit-code -- package.json package-lock.json

      - name: Upload sanitized dependency resolution evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fanmind-dependency-resolution-audit
          path: fanmind-dependency-resolution-audit.txt
          if-no-files-found: error
          retention-days: 7
