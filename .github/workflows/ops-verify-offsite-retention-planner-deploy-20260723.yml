name: FanMind P1 Verify Deployed Offsite Retention Planner

on:
  push:
    branches:
      - ops/verify-offsite-retention-planner-deploy-20260723
    paths:
      - ".github/workflows/ops-verify-offsite-retention-planner-deploy-20260723.yml"

concurrency:
  group: fanmind-p1-verify-offsite-retention-planner-deploy-20260723
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on:
      - self-hosted
      - fanmind-prod
      - exoscale
      - linux
      - x64
    timeout-minutes: 20
    env:
      EXPECTED_RELEASE: 0270b03305b7e75b6d5260b73a652280c9f5871b
      REPORT_PATH: fanmind-deployed-offsite-retention-planner-verification.txt
    steps:
      - name: Wait for exact deployed release and validate health
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          report="$GITHUB_WORKSPACE/$REPORT_PATH"
          : > "$report"

          release=""
          for attempt in $(seq 1 60); do
            release="$(curl -fsSL --max-time 15 https://fanmind.ch/api/version 2>/dev/null \
              | node -e '
                  let input = "";
                  process.stdin.on("data", chunk => input += chunk);
                  process.stdin.on("end", () => {
                    try {
                      const payload = JSON.parse(input);
                      const value = typeof payload.releaseCommit === "string" ? payload.releaseCommit : "";
                      process.stdout.write(/^[0-9a-f]{40}$/.test(value) ? value : "missing");
                    } catch {
                      process.stdout.write("missing");
                    }
                  });
                ' || true)"

            if [[ "$release" == "$EXPECTED_RELEASE" ]]; then
              printf 'DEPLOY_MATCH_ATTEMPT=%s\n' "$attempt" | tee -a "$report"
              break
            fi
            sleep 10
          done

          printf 'EXPECTED_RELEASE=%s\n' "$EXPECTED_RELEASE" | tee -a "$report"
          printf 'LIVE_RELEASE=%s\n' "${release:-missing}" | tee -a "$report"
          if [[ "$release" != "$EXPECTED_RELEASE" ]]; then
            echo 'DEPLOY_RESULT=expected_release_not_live' | tee -a "$report"
            exit 1
          fi
          echo 'DEPLOY_RESULT=exact_release_live' | tee -a "$report"

          server_head="$(git -C /var/www/fanmind rev-parse HEAD)"
          origin_main="$(git -C /var/www/fanmind rev-parse origin/main)"
          printf 'SERVER_HEAD=%s\n' "$server_head" | tee -a "$report"
          printf 'ORIGIN_MAIN=%s\n' "$origin_main" | tee -a "$report"
          if [[ "$server_head" != "$EXPECTED_RELEASE" || "$origin_main" != "$EXPECTED_RELEASE" ]]; then
            echo 'SERVER_SYNC=failed' | tee -a "$report"
            exit 1
          fi
          echo 'SERVER_SYNC=ok' | tee -a "$report"

          health_file="$RUNNER_TEMP/fanmind-health-${GITHUB_RUN_ID}.json"
          curl -fsSL --max-time 15 https://fanmind.ch/api/health > "$health_file"
          HEALTH_FILE="$health_file" node <<'NODE' | tee -a "$report"
          const fs = require('node:fs');
          const payload = JSON.parse(fs.readFileSync(process.env.HEALTH_FILE, 'utf8'));
          const checks = Array.isArray(payload.checks) ? payload.checks : [];
          const status = typeof payload.status === 'string' ? payload.status : 'missing';
          console.log(`LIVE_HEALTH=${status}`);
          for (const check of checks) {
            const component = String(check?.component || 'unknown').replace(/[^a-zA-Z0-9_.:-]/g, '_').slice(0, 80);
            const componentStatus = String(check?.status || 'missing').replace(/[^a-zA-Z0-9_.:-]/g, '_').slice(0, 40);
            console.log(`HEALTH_COMPONENT=${component}:${componentStatus}`);
          }
          if (status !== 'healthy' || checks.length === 0 || checks.some(check => check?.status !== 'healthy')) {
            process.exitCode = 1;
          }
          NODE
          rm -f "$health_file"

      - name: Verify installed planner and run read-only plan
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          report="$GITHUB_WORKSPACE/$REPORT_PATH"
          planner=/usr/local/lib/fanmind-ops/offsite-backup-retention-plan.mjs

          sudo -n test -f "$planner"
          sudo -n test ! -L "$planner"
          owner="$(sudo -n stat -c '%U:%G' "$planner")"
          mode="$(sudo -n stat -c '%a' "$planner")"
          printf 'INSTALLED_PLANNER_OWNER=%s\n' "$owner" | tee -a "$report"
          printf 'INSTALLED_PLANNER_MODE=%s\n' "$mode" | tee -a "$report"
          if [[ "$owner" != 'root:root' || "$mode" != '750' ]]; then
            echo 'INSTALLED_PLANNER_INTEGRITY=failed' | tee -a "$report"
            exit 1
          fi
          echo 'INSTALLED_PLANNER_INTEGRITY=ok' | tee -a "$report"

          sudo -n env \
            FANMIND_BACKUP_ENV_FILE=/etc/fanmind-backup/worker.env \
            /usr/bin/node "$planner" --dry-run \
            2>&1 | tee -a "$report"

      - name: Enforce deployed planner contract
        shell: bash
        run: |
          set -euo pipefail
          REPORT="$REPORT_PATH" node <<'NODE'
          const fs = require('node:fs');
          const source = fs.readFileSync(process.env.REPORT, 'utf8');
          const lines = source.split(/\r?\n/).filter(Boolean);
          const single = key => {
            const prefix = `${key}=`;
            const matches = lines.filter(line => line.startsWith(prefix));
            return matches.length ? matches.at(-1).slice(prefix.length) : null;
          };
          const all = key => {
            const prefix = `${key}=`;
            return lines.filter(line => line.startsWith(prefix)).map(line => line.slice(prefix.length));
          };
          const requireEqual = (key, expected) => {
            const actual = single(key);
            console.log(`ASSERT_${key}=${actual === expected ? 'ok' : 'failed'}|actual:${actual ?? 'missing'}`);
            if (actual !== expected) throw new Error(`${key}_mismatch`);
          };
          const integer = key => {
            const value = Number(single(key));
            if (!Number.isInteger(value) || value < 0) throw new Error(`${key}_invalid`);
            return value;
          };

          requireEqual('DEPLOY_RESULT', 'exact_release_live');
          requireEqual('SERVER_SYNC', 'ok');
          requireEqual('LIVE_HEALTH', 'healthy');
          requireEqual('INSTALLED_PLANNER_INTEGRITY', 'ok');
          requireEqual('OFFSITE_RETENTION_MODE', 'read_only_dry_run');
          requireEqual('OFFSITE_REMOTE_IDENTIFIER_REDACTED', 'true');
          requireEqual('OFFSITE_ORPHAN_PAIR_COUNT', '0');
          requireEqual('OFFSITE_UNRECOGNIZED_PAIR_COUNT', '0');
          requireEqual('OFFSITE_LATEST_PER_TYPE_PROTECTED', 'true');
          requireEqual('OFFSITE_RETENTION_PLAN_STRUCTURALLY_SAFE', 'true');
          requireEqual('OFFSITE_RETENTION_EXECUTION_AVAILABLE', 'false');
          requireEqual('OFFSITE_REMOTE_DELETE_EXECUTED', 'false');
          requireEqual('OFFSITE_RETENTION_DRY_RUN_RESULT', 'success');

          const complete = integer('OFFSITE_COMPLETE_PAIR_COUNT');
          const keep = integer('OFFSITE_KEEP_PAIR_COUNT');
          const candidates = integer('OFFSITE_DELETION_CANDIDATE_PAIR_COUNT');
          if (complete <= 0 || keep <= 0 || keep + candidates !== complete) {
            throw new Error('offsite_pair_count_contract_failed');
          }

          const types = all('OFFSITE_RETENTION_TYPE');
          if (types.length !== 4 || types.some(value => !/\|latest_protected:true$/.test(value))) {
            throw new Error('offsite_type_contract_failed');
          }

          if (/fanmind-(?:database|storage|server-config|full)-\d{13}/u.test(source)) {
            throw new Error('backup_filename_leaked');
          }
          if (/deletefile|\bpurge\b|\bsync\b|\bmoveto\b|\bcopyto\b/u.test(source)) {
            throw new Error('remote_mutation_command_observed');
          }

          console.log(`ASSERT_OFFSITE_COUNTS=ok|complete:${complete}|keep:${keep}|candidate:${candidates}`);
          console.log('DEPLOYED_OFFSITE_RETENTION_PLANNER_RESULT=success');
          NODE

      - name: Upload sanitized deployed planner report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fanmind-deployed-offsite-retention-planner-verification
          path: fanmind-deployed-offsite-retention-planner-verification.txt
          if-no-files-found: error
          retention-days: 7
