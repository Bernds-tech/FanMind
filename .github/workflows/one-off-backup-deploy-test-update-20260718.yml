name: One-off backup deploy test update 20260718

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feat/opt-in-isolated-release-deploy-20260718' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/opt-in-isolated-release-deploy-20260718
          fetch-depth: 0
          persist-credentials: true
      - run: python3 scripts/one-off/update-backup-deploy-test-20260718.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/backup-worker.test.mjs
          git commit -m "test: cover legacy and isolated deployment paths"
          git push origin HEAD:feat/opt-in-isolated-release-deploy-20260718
