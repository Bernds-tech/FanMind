name: One-off referral table finalizer 20260718

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feat/referral-participation-terms-20260718' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/referral-participation-terms-20260718
          fetch-depth: 0
          persist-credentials: true
      - run: python3 scripts/one-off/fix-referral-example-table-20260718.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/REFERRAL_PROGRAM.md
          git commit -m "docs: align referral example table with base-only discount"
          git push origin HEAD:feat/referral-participation-terms-20260718
