name: FanMind P1 Verify Deployed Staging Boundary

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/ops-verify-staging-boundary-deploy-20260723.yml"

concurrency:
  group: fanmind-p1-verify-staging-boundary-deploy-20260723
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'ops/verify-staging-boundary-deploy-20260723'
    runs-on:
      - self-hosted
      - fanmind-prod
      - exoscale
      - linux
      - x64
    timeout-minutes: 20
    env:
      EXPECTED_RELEASE: 2f580de47b5ebb4d4caaac08ff9ca0b94be1ae22
      REPORT_PATH: fanmind-staging-boundary-production-verification.txt
    steps:
      - name: Wait for exact release and validate public health
        shell: bash
        run: |
          set -euo pipefail
          report="$GITHUB_WORKSPACE/$REPORT_PATH"
          : > "$report"

          release=""
          for attempt in $(seq 1 60); do
            release="$(curl -fsSL --max-time 15 https://fanmind.ch/api/version 2>/dev/null \
              | node -e '
                  let input = "";
                  process.stdin.on("data", chunk => input += chunk);
                  process.stdin.on("end", () => {
                    try {
                      const payload = JSON.parse(input);
                      const value = typeof payload.releaseCommit === "string" ? payload.releaseCommit : "";
                      process.stdout.write(/^[0-9a-f]{40}$/.test(value) ? value : "missing");
                    } catch {
                      process.stdout.write("missing");
                    }
                  });
                ' || true)"
            if [[ "$release" == "$EXPECTED_RELEASE" ]]; then
              printf 'DEPLOY_MATCH_ATTEMPT=%s\n' "$attempt" | tee -a "$report"
              break
            fi
            sleep 10
          done

          printf 'EXPECTED_RELEASE=%s\n' "$EXPECTED_RELEASE" | tee -a "$report"
          printf 'LIVE_RELEASE=%s\n' "${release:-missing}" | tee -a "$report"
          if [[ "$release" != "$EXPECTED_RELEASE" ]]; then
            echo 'DEPLOY_RESULT=expected_release_not_live' | tee -a "$report"
            exit 1
          fi
          echo 'DEPLOY_RESULT=exact_release_live' | tee -a "$report"

          server_head="$(git -C /var/www/fanmind rev-parse HEAD)"
          origin_main="$(git -C /var/www/fanmind rev-parse origin/main)"
          printf 'SERVER_HEAD=%s\n' "$server_head" | tee -a "$report"
          printf 'ORIGIN_MAIN=%s\n' "$origin_main" | tee -a "$report"
          if [[ "$server_head" != "$EXPECTED_RELEASE" || "$origin_main" != "$EXPECTED_RELEASE" ]]; then
            echo 'SERVER_SYNC=failed' | tee -a "$report"
            exit 1
          fi
          echo 'SERVER_SYNC=ok' | tee -a "$report"

          health_file="$RUNNER_TEMP/fanmind-health-${GITHUB_RUN_ID}.json"
          curl -fsSL --max-time 15 https://fanmind.ch/api/health > "$health_file"
          HEALTH_FILE="$health_file" node <<'NODE' | tee -a "$report"
          const fs = require('node:fs');
          const payload = JSON.parse(fs.readFileSync(process.env.HEALTH_FILE, 'utf8'));
          const checks = Array.isArray(payload.checks) ? payload.checks : [];
          const status = typeof payload.status === 'string' ? payload.status : 'missing';
          console.log(`LIVE_HEALTH=${status}`);
          for (const check of checks) {
            const component = String(check?.component || 'unknown').replace(/[^a-zA-Z0-9_.:-]/g, '_').slice(0, 80);
            const componentStatus = String(check?.status || 'missing').replace(/[^a-zA-Z0-9_.:-]/g, '_').slice(0, 40);
            console.log(`HEALTH_COMPONENT=${component}:${componentStatus}`);
          }
          if (status !== 'healthy' || checks.length === 0 || checks.some(check => check?.status !== 'healthy')) {
            process.exitCode = 1;
          }
          NODE
          rm -f "$health_file"

      - name: Verify merged boundary behavior with synthetic values
        shell: bash
        run: |
          set -euo pipefail
          report="$GITHUB_WORKSPACE/$REPORT_PATH"
          cd /var/www/fanmind
          /usr/bin/node --input-type=module <<'NODE' | tee -a "$report"
          import {
            NON_PRODUCTION_WRITE_ACKNOWLEDGEMENT,
            evaluateEnvironmentBoundary,
          } from './src/lib/environmentBoundaryPolicy.mjs';

          const base = {
            FANMIND_RUNTIME_ENVIRONMENT: 'staging',
            NEXT_PUBLIC_APP_URL: 'https://staging.synthetic.invalid',
            NEXT_PUBLIC_SUPABASE_URL: 'https://stagingref12345.supabase.co',
            FANMIND_TARGET_SUPABASE_PROJECT_REF: 'stagingref12345',
            FANMIND_PRODUCTION_SUPABASE_PROJECT_REF: 'productionref123',
            FANMIND_ENABLE_NON_PRODUCTION_WRITES: 'false',
          };

          const matching = evaluateEnvironmentBoundary(base);
          const mismatched = evaluateEnvironmentBoundary({
            ...base,
            FANMIND_TARGET_SUPABASE_PROJECT_REF: 'differentref123',
          });
          const writeWithoutExplicitRef = evaluateEnvironmentBoundary(
            {
              ...base,
              FANMIND_TARGET_SUPABASE_PROJECT_REF: '',
              FANMIND_ENABLE_NON_PRODUCTION_WRITES: 'true',
              FANMIND_NON_PRODUCTION_WRITE_ACK: NON_PRODUCTION_WRITE_ACKNOWLEDGEMENT,
            },
            { allowWrite: true },
          );
          const fallback = evaluateEnvironmentBoundary({
            ...base,
            NEXT_PUBLIC_APP_URL: '   ',
            NEXT_PUBLIC_SITE_URL: 'https://staging-fallback.synthetic.invalid',
          });
          const production = evaluateEnvironmentBoundary({
            FANMIND_RUNTIME_ENVIRONMENT: 'production',
            NEXT_PUBLIC_APP_URL: 'https://fanmind.ch',
            NEXT_PUBLIC_SUPABASE_URL: 'https://productionref123.supabase.co',
            FANMIND_PRODUCTION_SUPABASE_PROJECT_REF: 'productionref123',
            FANMIND_ENABLE_NON_PRODUCTION_WRITES: 'false',
          });

          const assertions = {
            matching_ok: matching.ok === true,
            matching_ref_binding: matching.supabaseTargetRefMatchesUrl === true,
            mismatch_rejected: mismatched.ok === false && mismatched.supabaseTargetRefMismatch === true,
            write_missing_explicit_ref_rejected:
              writeWithoutExplicitRef.ok === false &&
              writeWithoutExplicitRef.supabaseExplicitProjectIdentified === false,
            empty_primary_fallback_ok: fallback.ok === true && fallback.appConfigured === true,
            production_read_only_ok: production.ok === true && production.supabaseProductionMatch === true,
          };

          for (const [name, value] of Object.entries(assertions)) {
            console.log(`BOUNDARY_ASSERT=${name}:${value ? 'ok' : 'failed'}`);
          }
          if (Object.values(assertions).some(value => !value)) process.exit(1);
          console.log('STAGING_BOUNDARY_PRODUCTION_VERIFICATION=success');
          NODE

      - name: Upload sanitized verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fanmind-staging-boundary-production-verification
          path: fanmind-staging-boundary-production-verification.txt
          if-no-files-found: error
          retention-days: 7
