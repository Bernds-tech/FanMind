name: FanMind CodeQL

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:

concurrency:
  group: fanmind-codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  packages: read
  security-events: write

jobs:
  analyze:
    name: JavaScript and TypeScript security analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3.35.3
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/mobile/package-lock.json

      - name: Install web dependencies reproducibly
        run: npm ci --no-audit --no-fund

      - name: Install Mobile dependencies reproducibly
        run: npm ci --prefix apps/mobile --no-audit --no-fund

      - name: Analyze JavaScript and TypeScript
        uses: github/codeql-action/analyze@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3.35.3
        with:
          category: "/language:javascript-typescript"
