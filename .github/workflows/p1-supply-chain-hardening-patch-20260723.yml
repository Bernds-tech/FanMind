name: FanMind P1 Supply Chain Hardening Patch

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/p1-supply-chain-hardening-patch-20260723.yml"
      - "scripts/security/supply-chain-hardening-patch-temp.mjs"

concurrency:
  group: fanmind-p1-supply-chain-hardening-patch-20260723
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  patch:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'p1/supply-chain-hardening-20260723' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout trusted hardening branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: p1/supply-chain-hardening-20260723
          fetch-depth: 1
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.13.1
          cache: npm

      - name: Pin workflows, remove obsolete one-off and patch manifest
        shell: bash
        run: |
          set -euo pipefail
          node scripts/security/supply-chain-hardening-patch-temp.mjs
          git diff --check

      - name: Refresh root lockfile and apply compatible audit fixes
        shell: bash
        run: |
          set -euo pipefail
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          set +e
          npm audit fix --package-lock-only --omit=dev --ignore-scripts --no-fund
          fix_status=$?
          set -e
          printf 'NPM_AUDIT_FIX_EXIT=%s\n' "$fix_status"
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          git diff --check

      - name: Verify only bounded reviewed advisories remain
        id: audit
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          set +e
          npm audit --omit=dev --json > root-audit-after-patch.json 2>/dev/null
          status=$?
          set -e
          AUDIT_STATUS="$status" node <<'NODE'
          const fs = require('node:fs');
          const payload = JSON.parse(fs.readFileSync('root-audit-after-patch.json', 'utf8'));
          const manifest = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const values = payload?.metadata?.vulnerabilities ?? {};
          const critical = Number(values.critical ?? 0);
          const high = Number(values.high ?? 0);
          const moderate = Number(values.moderate ?? 0);
          const entries = Object.entries(payload?.vulnerabilities ?? {})
            .sort(([a], [b]) => a.localeCompare(b));
          const names = entries.map(([name]) => name);
          const allowedNames = new Set(['next', 'postcss', 'sharp']);
          const onlyReviewedNames = names.every(name => allowedNames.has(name));
          const packagePinned = manifest?.dependencies?.next === '16.2.11'
            && manifest?.devDependencies?.['eslint-config-next'] === '16.2.11';
          const expiry = Date.parse('2026-08-07T00:00:00Z');
          const withinReviewWindow = Date.now() < expiry;
          const reviewed = critical === 0
            && high <= 2
            && moderate <= 1
            && onlyReviewedNames
            && packagePinned
            && withinReviewWindow;
          const lines = [
            `ROOT_AUDIT_EXIT=${process.env.AUDIT_STATUS}`,
            `ROOT_AUDIT_CRITICAL=${critical}`,
            `ROOT_AUDIT_HIGH=${high}`,
            `ROOT_AUDIT_MODERATE=${moderate}`,
            `ROOT_NEXT_VERSION=${manifest?.dependencies?.next ?? 'missing'}`,
            `ROOT_REVIEWED_ADVISORY_PACKAGES=${names.join(',') || 'none'}`,
            'ROOT_REVIEW_EXCEPTION_EXPIRES=2026-08-07',
            `ROOT_REVIEWED_EXCEPTION=${reviewed ? 'accepted' : 'rejected'}`,
          ];
          for (const [name, item] of entries) {
            lines.push(`${name}|severity:${item?.severity ?? 'unknown'}|direct:${item?.isDirect === true}`);
          }
          fs.writeFileSync('root-audit-after-patch-summary.txt', `${lines.join('\n')}\n`, { mode: 0o644 });
          process.stdout.write(`${lines.join('\n')}\n`);
          if (!reviewed) process.exit(1);
          NODE

      - name: Upload bounded post-patch audit evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fanmind-root-audit-after-security-patch
          path: root-audit-after-patch-summary.txt
          if-no-files-found: error
          retention-days: 3

      - name: Enforce audit result
        if: steps.audit.outcome != 'success'
        run: exit 1

      - name: Stage deterministic patch output
        shell: bash
        run: |
          set -euo pipefail
          output="supply-chain-patch-output"
          rm -rf "$output"
          mkdir -p "$output/.github/workflows"
          for workflow in .github/workflows/*.yml .github/workflows/*.yaml; do
            [ -f "$workflow" ] || continue
            name="$(basename "$workflow")"
            [ "$name" = "p1-supply-chain-hardening-patch-20260723.yml" ] && continue
            cp "$workflow" "$output/.github/workflows/$name"
          done
          cp package.json package-lock.json "$output/"
          printf '%s\n' '.github/workflows/one-off-apply-top-fan-migration-20260719.yml' > "$output/deleted-files.txt"
          find "$output" -type f -exec chmod 0644 {} +

      - name: Upload deterministic patch output
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fanmind-supply-chain-hardening-patch-output
          path: supply-chain-patch-output
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 3

      - name: Commit only reviewed manifest and lockfile updates
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git diff --cached --quiet && { echo "Manifest patch produced no changes" >&2; exit 1; }
          git commit -m "Update Next.js security patch and lockfile"
          git push origin HEAD:p1/supply-chain-hardening-20260723
