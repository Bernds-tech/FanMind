name: FanMind Mobile CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "apps/mobile/**"
      - "src/lib/requestAccessToken.ts"
      - "src/lib/workspaceAuthorization.ts"
      - "src/lib/supabase/server.ts"
      - "src/app/api/ai/reply-suggestions/route.ts"
      - ".github/workflows/ci-mobile.yml"
  push:
    branches:
      - "feat/mobile-**"
      - "p0/**"
    paths:
      - "apps/mobile/**"
      - "src/lib/requestAccessToken.ts"
      - "src/lib/workspaceAuthorization.ts"
      - "src/lib/supabase/server.ts"
      - "src/app/api/ai/reply-suggestions/route.ts"
      - ".github/workflows/ci-mobile.yml"

concurrency:
  group: fanmind-mobile-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-mobile:
    name: Typecheck, doctor and Android bundle
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/mobile
    env:
      EXPO_PUBLIC_SUPABASE_URL: https://exampleproject.supabase.co
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-public-anon-key-1234567890
      EXPO_PUBLIC_FANMIND_API_URL: https://fanmind.ch
      EXPO_NO_TELEMETRY: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.13.1
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install mobile dependencies
        shell: bash
        run: |
          set -o pipefail
          npm ci --no-audit --no-fund 2>&1 | tee mobile-install-report.txt

      - name: Upload mobile install report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fanmind-mobile-install-report
          path: apps/mobile/mobile-install-report.txt
          if-no-files-found: error
          retention-days: 5

      - name: Typecheck independent mobile app
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee mobile-typecheck-report.txt

      - name: Upload mobile typecheck report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fanmind-mobile-typecheck-report
          path: apps/mobile/mobile-typecheck-report.txt
          if-no-files-found: error
          retention-days: 5

      - name: Validate Expo configuration
        id: doctor
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run doctor 2>&1 | tee expo-doctor-report.txt

      - name: Upload Expo Doctor report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fanmind-mobile-expo-doctor-report
          path: apps/mobile/expo-doctor-report.txt
          if-no-files-found: error
          retention-days: 5

      - name: Build Android JavaScript bundle
        id: android_bundle
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run export:android 2>&1 | tee mobile-android-export-report.txt

      - name: Upload Android export report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fanmind-mobile-android-export-report
          path: apps/mobile/mobile-android-export-report.txt
          if-no-files-found: error
          retention-days: 5

      - name: Enforce mobile boundary
        id: boundary
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run boundary 2>&1 | tee mobile-boundary-report.txt

      - name: Upload mobile boundary report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fanmind-mobile-boundary-report
          path: apps/mobile/mobile-boundary-report.txt
          if-no-files-found: error
          retention-days: 5

      - name: Upload Android bundle artifact
        if: always() && steps.android_bundle.outcome == 'success'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fanmind-mobile-android-bundle
          path: apps/mobile/dist-android
          if-no-files-found: error
          retention-days: 5

      - name: Enforce mobile typecheck result
        if: always() && steps.typecheck.outcome != 'success'
        run: exit 1

      - name: Enforce Expo Doctor result
        if: always() && steps.doctor.outcome != 'success'
        run: exit 1

      - name: Enforce Android bundle result
        if: always() && steps.android_bundle.outcome != 'success'
        run: exit 1

      - name: Enforce mobile boundary result
        if: always() && steps.boundary.outcome != 'success'
        run: exit 1
