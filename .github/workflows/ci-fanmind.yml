name: FanMind CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - "fix/**"
      - "feat/**"
      - "chore/**"
      - "p0/**"

concurrency:
  group: fanmind-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Truth, lint, tests and build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_APP_URL: https://fanmind.ch
      NEXT_PUBLIC_SITE_URL: https://fanmind.ch
      FANMIND_PUBLIC_DEMO_ENABLED: "false"
      FANMIND_ENABLE_REFERRAL_BILLING: "false"
      FANMIND_ENABLE_TELEGRAM_SEND: "false"
      FANMIND_ADMIN_EMAILS: admin@example.com

    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.13.1
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Verify commercial and product truth
        id: truth
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run verify:truth 2>&1 | tee truth-report.txt

      - name: Upload truth report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fanmind-truth-report
          path: truth-report.txt
          if-no-files-found: error
          retention-days: 7

      - name: Lint
        id: lint
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee lint-report.txt

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fanmind-lint-report
          path: lint-report.txt
          if-no-files-found: error
          retention-days: 7

      - name: Operations tests
        id: operations
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run test:operations 2>&1 | tee operations-test-report.txt

      - name: Upload operations test report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fanmind-operations-test-report
          path: operations-test-report.txt
          if-no-files-found: error
          retention-days: 7

      - name: Production build
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build-report.txt

      - name: Upload build report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fanmind-build-report
          path: build-report.txt
          if-no-files-found: error
          retention-days: 7

      - name: Enforce truth result
        if: always() && steps.truth.outcome != 'success'
        run: |
          echo "Commercial/product truth verification failed. See fanmind-truth-report artifact." >&2
          exit 1

      - name: Enforce lint result
        if: always() && steps.lint.outcome != 'success'
        run: |
          echo "Lint failed. See fanmind-lint-report artifact." >&2
          exit 1

      - name: Enforce operations test result
        if: always() && steps.operations.outcome != 'success'
        run: |
          echo "Operations tests failed. See fanmind-operations-test-report artifact." >&2
          exit 1

      - name: Enforce build result
        if: always() && steps.build.outcome != 'success'
        run: |
          echo "Production build failed. See fanmind-build-report artifact." >&2
          exit 1
