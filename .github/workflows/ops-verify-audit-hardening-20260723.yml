name: FanMind P1 Verify Deployed Audit Output Hardening

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/ops-verify-audit-hardening-20260723.yml"

concurrency:
  group: fanmind-p1-verify-audit-hardening-20260723
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'ops/verify-audit-hardening-20260723'
    runs-on:
      - self-hosted
      - fanmind-prod
      - exoscale
      - linux
      - x64
    timeout-minutes: 25
    env:
      EXPECTED_RELEASE: 9bc2d9c9c3deb488387724af258835a6e7ef3855
      AUDIT_REPORT_PATH: fanmind-deployed-audit-hardening-verification.txt
    steps:
      - name: Wait for exact hardened audit release
        shell: bash
        run: |
          set -euo pipefail
          report="$GITHUB_WORKSPACE/$AUDIT_REPORT_PATH"
          : > "$report"

          {
            printf 'VERIFY_UTC=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            printf 'EXPECTED_RELEASE=%s\n' "$EXPECTED_RELEASE"

            release=""
            for attempt in $(seq 1 90); do
              release="$(curl -fsSL --max-time 15 https://fanmind.ch/api/version 2>/dev/null \
                | node -e '
                    let input = "";
                    process.stdin.on("data", chunk => input += chunk);
                    process.stdin.on("end", () => {
                      try {
                        const payload = JSON.parse(input);
                        const value = typeof payload.releaseCommit === "string" ? payload.releaseCommit : "";
                        process.stdout.write(/^[0-9a-f]{40}$/.test(value) ? value : "missing");
                      } catch {
                        process.stdout.write("missing");
                      }
                    });
                  ' || true)"
              if [[ "$release" == "$EXPECTED_RELEASE" ]]; then
                printf 'DEPLOY_MATCH_ATTEMPT=%s\n' "$attempt"
                break
              fi
              printf 'DEPLOY_WAIT_ATTEMPT=%s|release=%s\n' "$attempt" "${release:-missing}"
              sleep 10
            done

            printf 'PRE_AUDIT_LIVE_RELEASE=%s\n' "${release:-missing}"
            if [[ "$release" != "$EXPECTED_RELEASE" ]]; then
              echo 'PRE_AUDIT_DEPLOY_RESULT=expected_release_not_live'
              exit 1
            fi
            echo 'PRE_AUDIT_DEPLOY_RESULT=exact_release_live'

            server_head="$(git -C /var/www/fanmind rev-parse HEAD)"
            origin_main="$(git -C /var/www/fanmind rev-parse origin/main)"
            printf 'PRE_AUDIT_SERVER_HEAD=%s\n' "$server_head"
            printf 'PRE_AUDIT_ORIGIN_MAIN=%s\n' "$origin_main"
            if [[ "$server_head" != "$EXPECTED_RELEASE" || "$origin_main" != "$EXPECTED_RELEASE" ]]; then
              echo 'PRE_AUDIT_SERVER_SYNC=failed'
              exit 1
            fi
            echo 'PRE_AUDIT_SERVER_SYNC=ok'
          } | tee -a "$report"

      - name: Run deployed hardened read-only audit
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          bash /var/www/fanmind/scripts/operations/read-only-production-audit.sh 2>&1 \
            | tee -a "$AUDIT_REPORT_PATH"

      - name: Enforce hardened production output
        shell: bash
        run: |
          set -euo pipefail
          REPORT="$AUDIT_REPORT_PATH" EXPECTED_RELEASE="$EXPECTED_RELEASE" node <<'NODE'
          const fs = require('node:fs');
          const source = fs.readFileSync(process.env.REPORT, 'utf8');
          const expected = process.env.EXPECTED_RELEASE;
          const lines = source.split(/\r?\n/).filter(Boolean);

          const single = key => {
            const prefix = `${key}=`;
            const matches = lines.filter(line => line.startsWith(prefix));
            return matches.length ? matches.at(-1).slice(prefix.length) : null;
          };
          const all = key => {
            const prefix = `${key}=`;
            return lines.filter(line => line.startsWith(prefix)).map(line => line.slice(prefix.length));
          };
          const requireEqual = (key, expectedValue) => {
            const actual = single(key);
            console.log(`ASSERT_${key}=${actual === expectedValue ? 'ok' : 'failed'}|actual:${actual ?? 'missing'}`);
            if (actual !== expectedValue) throw new Error(`${key}_mismatch`);
          };
          const requireHttp = key => {
            const actual = single(key);
            const ok = typeof actual === 'string' && /^[23]\d\d$/.test(actual);
            console.log(`ASSERT_${key}=${ok ? 'ok' : 'failed'}|actual:${actual ?? 'missing'}`);
            if (!ok) throw new Error(`${key}_unhealthy`);
          };

          requireEqual('SERVER_HEAD', expected);
          requireEqual('ORIGIN_MAIN', expected);
          requireEqual('LIVE_RELEASE', expected);
          requireEqual('LIVE_ENVIRONMENT', 'production');
          requireEqual('LIVE_HEALTH', 'healthy');
          requireEqual('PM2_STATUS', 'online');
          requireEqual('PM2_UNSTABLE_RESTARTS', '0');
          requireEqual('NGINX_CONFIG', 'ok');
          requireHttp('LOCAL_LOGIN_HTTP');
          requireHttp('PUBLIC_LOGIN_HTTP');
          requireEqual('BACKUP_ROOT', 'available');
          requireEqual('BACKUP_ORPHAN_PAIR_COUNT', '0');
          requireEqual('BACKUP_VERIFY_OK', 'true');
          requireEqual('BACKUP_VERIFY_MODE', 'checksum_only');
          requireEqual('BACKUP_VERIFY_TYPE', 'full');
          requireEqual('BACKUP_WORKER_24H_FAILURE_EVENT_COUNT', '0');
          requireEqual('BACKUP_WORKER_24H_FAILURE_FREE', 'true');
          requireEqual('AUDIT_RESULT', 'success');

          const components = all('HEALTH_COMPONENT');
          if (components.length === 0 || components.some(value => !/:healthy$/.test(value))) {
            throw new Error('health_components_unhealthy');
          }

          const timers = all('SYSTEMD_TIMER');
          const stableTimers = timers.length > 0 && timers.every(value =>
            /^fanmind-[a-z0-9_@.-]+\.timer\|next_realtime=[^|]+\|next_monotonic=[^|]+\|last=.+$/i.test(value),
          );
          const relativeTimerObserved = timers.some(value =>
            /\|next_monotonic=(?!unknown(?:\||$))[^|]+\|/i.test(value),
          );
          console.log(`ASSERT_SYSTEMD_TIMERS=${stableTimers ? 'ok' : 'failed'}|count:${timers.length}`);
          console.log(`ASSERT_RELATIVE_TIMER=${relativeTimerObserved ? 'ok' : 'failed'}`);
          if (!stableTimers || !relativeTimerObserved) throw new Error('timer_output_invalid');

          const windows = new Set(all('BACKUP_WORKER_WINDOW'));
          if (!(windows.has('24h') && windows.has('14d') && windows.size === 2)) {
            throw new Error('worker_windows_invalid');
          }
          const workerEvents = all('BACKUP_WORKER_EVENT');
          for (const expectedEvent of [
            '24h|claim_failed:0',
            '24h|job_failed:0',
            '24h|job_rejected:0',
            '24h|fatal:0',
          ]) {
            if (!workerEvents.includes(expectedEvent)) {
              throw new Error(`worker_event_mismatch_${expectedEvent.replace(/[^a-z0-9]+/gi, '_')}`);
            }
          }

          if (/SYSTEMD_TIMER=(?:Mon|Tue|Wed|Thu|Fri|Sat|Sun)\b/.test(source)) {
            throw new Error('localized_timer_column_detected');
          }

          const offsiteEnabled = single('OFFSITE_ENABLED');
          const offsiteStatus = single('OFFSITE_STATUS');
          if (offsiteEnabled === 'true') {
            requireEqual('OFFSITE_STATUS', 'reachable');
            requireEqual('OFFSITE_ORPHAN_PAIR_COUNT', '0');
          } else if (offsiteStatus !== 'not_enabled') {
            throw new Error('offsite_state_invalid');
          }

          console.log(`REBOOT_REQUIRED_OBSERVED=${single('REBOOT_REQUIRED') ?? 'missing'}`);
          console.log('DEPLOYED_AUDIT_HARDENING_RESULT=success');
          NODE

      - name: Upload sanitized deployed audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fanmind-deployed-audit-hardening-verification
          path: fanmind-deployed-audit-hardening-verification.txt
          if-no-files-found: error
          retention-days: 7
