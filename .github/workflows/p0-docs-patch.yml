name: FanMind P0 Docs Patch

on:
  push:
    branches:
      - p0/completion-20260722
    paths:
      - "scripts/p0-docs-patch.mjs"
      - ".github/workflows/p0-docs-patch.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout P0 branch
        uses: actions/checkout@v4
        with:
          ref: p0/completion-20260722
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Apply guarded docs patch
        run: node scripts/p0-docs-patch.mjs

      - name: Validate patch
        run: |
          git diff --check
          grep -F 'Mobile-App für Android & iOS' src/config/roadmap.ts
          grep -F '## 3. Eigenständige Mobile-App' docs/SOURCE_OF_TRUTH.md
          grep -F '## Mobile-App' README.md
          grep -F '## Mobile product boundary' AGENTS.md

      - name: Commit patched documentation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md AGENTS.md docs/SOURCE_OF_TRUTH.md src/config/roadmap.ts src/lib/landingEnglishCopySupplement.ts
          git commit -m "Document Mobile as an active product stream"
          git push origin HEAD:p0/completion-20260722
