name: One-off server error route fallback 20260718

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feat/privacy-server-error-tracking-20260718' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/privacy-server-error-tracking-20260718
      - name: Harden route fallback
        run: python3 scripts/one-off/harden-server-error-route-fallback-20260718.py
      - name: Commit route hardening
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/serverErrorTelemetry.ts
          git diff --cached --quiet && exit 0
          git commit -m "Redact missing server error route templates"
          git push origin HEAD:feat/privacy-server-error-tracking-20260718
