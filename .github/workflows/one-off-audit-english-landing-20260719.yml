name: One-off English landing runtime audit 20260719

on:
  push:
    branches:
      - audit/english-landing-20260719

permissions:
  contents: write

jobs:
  audit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
      FANMIND_PUBLIC_DEMO_ENABLED: false
      FANMIND_ENABLE_REFERRAL_BILLING: false
      FANMIND_ENABLE_TELEGRAM_SEND: false
      FANMIND_ADMIN_EMAILS: admin@example.com
    steps:
      - uses: actions/checkout@v4
        with:
          ref: audit/english-landing-20260719
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - name: Start application
        run: |
          FANMIND_RELEASE_COMMIT="$(git rev-parse HEAD)" npm start > /tmp/fanmind-english-audit.log 2>&1 &
          echo $! > /tmp/fanmind-english-audit.pid
          for attempt in $(seq 1 30); do
            if curl -fsS 'http://127.0.0.1:3000/?lang=en' -o /tmp/fanmind-en.html; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/fanmind-english-audit.log
          exit 1
      - name: Persist likely German text nodes on English page
        run: |
          mkdir -p docs/audits
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import re

          class TextParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.skip = 0
                  self.nodes = []
              def handle_starttag(self, tag, attrs):
                  if tag in {"script", "style", "svg"}:
                      self.skip += 1
              def handle_endtag(self, tag):
                  if tag in {"script", "style", "svg"} and self.skip:
                      self.skip -= 1
              def handle_data(self, data):
                  if self.skip:
                      return
                  value = " ".join(data.split())
                  if value:
                      self.nodes.append(value)

          parser = TextParser()
          parser.feed(Path('/tmp/fanmind-en.html').read_text(encoding='utf-8'))

          markers = re.compile(
              r"[ÃĪÃķÃžÃÃÃÃ]|\b(?:dein|deine|deinen|deinem|fÃžr|und|oder|heute|morgen|"
              r"kostenlos|testen|kontakte|kontakt|manuell|manuelle|nÃĪchste|nÃĪchsten|"
              r"vorschlag|vorschlÃĪge|verfÃžgbar|keine|kein|kampagnen|nachrichten|"
              r"erinnerungen|antworten|prÃžfung|freigabe|beispieldaten|einmalig|"
              r"monat|monate|jederzeit|kÃžndbar|einrichtung|aktiv|bereit|inaktiv|"
              r"spÃĪter|auswertung|Ãžbersicht|wichtig|interessen|historie|speichern|"
              r"vorbereiten|senden|versand|nachfassaktionen|wachstumssignale)\b",
              re.IGNORECASE,
          )

          seen = set()
          matches = []
          for node in parser.nodes:
              if markers.search(node) and node not in seen:
                  seen.add(node)
                  matches.append(node)

          lines = [f"GERMAN_NODE_COUNT={len(matches)}"]
          lines.extend(f"GERMAN_NODE_{index:03d}={node}" for index, node in enumerate(matches, 1))
          Path('docs/audits/english-landing-runtime-audit-20260719.txt').write_text(
              "\n".join(lines) + "\n",
              encoding='utf-8',
          )
          print("\n".join(lines))
          PY
      - name: Stop application
        if: always()
        run: |
          if [ -f /tmp/fanmind-english-audit.pid ]; then
            kill "$(cat /tmp/fanmind-english-audit.pid)" 2>/dev/null || true
          fi
      - name: Commit audit result and remove one-off workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/one-off-audit-english-landing-20260719.yml
          git add docs/audits/english-landing-runtime-audit-20260719.txt
          git commit -m "Record English landing runtime audit"
          git push origin HEAD:audit/english-landing-20260719
