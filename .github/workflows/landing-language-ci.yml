name: FanMind Landing Language CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  language-runtime-guard:
    runs-on: ubuntu-24.04
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
      FANMIND_PUBLIC_DEMO_ENABLED: false
      FANMIND_ENABLE_REFERRAL_BILLING: false
      FANMIND_ENABLE_TELEGRAM_SEND: false
      FANMIND_ADMIN_EMAILS: admin@example.com
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - name: Start application
        run: |
          FANMIND_RELEASE_COMMIT="$(git rev-parse HEAD)" npm start > /tmp/fanmind-language-ci.log 2>&1 &
          echo $! > /tmp/fanmind-language-ci.pid
          for attempt in $(seq 1 30); do
            if curl -fsS 'http://127.0.0.1:3000/' -o /tmp/fanmind-de.html && curl -fsS 'http://127.0.0.1:3000/?lang=en' -o /tmp/fanmind-en.html; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/fanmind-language-ci.log
          exit 1
      - name: Reject untranslated visible landing copy
        run: |
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import re

          class TextParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.skip = 0
                  self.nodes = []
              def handle_starttag(self, tag, attrs):
                  if tag in {"script", "style", "svg"}:
                      self.skip += 1
              def handle_endtag(self, tag):
                  if tag in {"script", "style", "svg"} and self.skip:
                      self.skip -= 1
              def handle_data(self, data):
                  if self.skip:
                      return
                  value = " ".join(data.split())
                  if value:
                      self.nodes.append(value)

          def parse(path):
              parser = TextParser()
              parser.feed(Path(path).read_text(encoding="utf-8"))
              return parser.nodes

          allowed_exact = {
              "Fan", "Mind", "Workflow", "Roadmap", "DE", "EN", "Login",
              "Follow-ups.", "FanMind", "Sandra M. 92 · Alex 88 · Mia 85",
              "4. Follow-ups", "6. Analytics", "Buyer", "SM", "Sandra M.",
              "buyer", "event", "Mia Active Club", "Follow-up.",
              "Avatar SM · Sandra M.", "sandra@mania-club.com", "BETA",
              "Owner: Nina D.", "Fan Score 92", "Status", "Fan Score", "Beta",
              "Instagram", "YouTube", "WhatsApp", "Snapchat", "Discord",
              "Threads", "Twitch", "Patreon / Memberships", "Buy Me a Coffee",
              "YouTube Live-Chat", "Reddit Communities", "Google Reviews",
              "Trustpilot", "Play Store Reviews", "Amazon", "Mercado Libre",
              "Douyin", "Weibo", "Bilibili", "LINE", "Viber", "Moj", "TikTok",
              "Facebook", "Telegram", "LinkedIn", "X / Twitter", "Reddit",
              "Pinterest", "Ko-fi", "Newsletter / Substack", "Discord Server",
              "Google Business Profile", "App Store Reviews", "Shopify", "Etsy",
              "WeChat", "Xiaohongshu / RedNote", "Kuaishou", "QQ", "KakaoTalk",
              "ShareChat", "Josh", "X", "Follow-ups", "Analytics", "Coming Soon",
              "Guardrail", "Multi-Workspace / Agency", "RESPONSIVE EXPERIENCE",
              "Starter Flex", "Growth", "Agency", "Enterprise / Custom", "FAQ",
              "FanMind Footer", "Name optional", "© 2026 FanMind ·",
          }

          de_nodes = parse("/tmp/fanmind-de.html")
          en_nodes = set(parse("/tmp/fanmind-en.html"))
          unexpected = []
          seen = set()

          for node in de_nodes:
              if node in seen or node not in en_nodes:
                  continue
              seen.add(node)
              if not re.search(r"[A-Za-zÄÖÜäöüß]", node):
                  continue
              if node in allowed_exact or re.fullmatch(r"Phase \d+", node):
                  continue
              unexpected.append(node)

          report = [f"UNEXPECTED_IDENTICAL_NODE_COUNT={len(unexpected)}"]
          report.extend(
              f"UNEXPECTED_IDENTICAL_NODE_{index:03d}={node}"
              for index, node in enumerate(unexpected, 1)
          )
          Path("/tmp/landing-language-ci-report.txt").write_text(
              "\n".join(report) + "\n",
              encoding="utf-8",
          )
          print("\n".join(report))

          if unexpected:
              raise SystemExit(
                  "English landing contains visible text identical to German outside the reviewed allowlist"
              )
          PY
      - name: Upload language report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: landing-language-ci-report
          path: /tmp/landing-language-ci-report.txt
          retention-days: 7
      - name: Stop application
        if: always()
        run: |
          if [ -f /tmp/fanmind-language-ci.pid ]; then
            kill "$(cat /tmp/fanmind-language-ci.pid)" 2>/dev/null || true
          fi
