name: One-off final go-live readiness 20260719

on:
  push:
    branches:
      - release/final-go-live-readiness-20260719

permissions:
  contents: write

jobs:
  consolidate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_APP_URL: https://fanmind.ch
      NEXT_PUBLIC_SITE_URL: https://fanmind.ch
      FANMIND_PUBLIC_DEMO_ENABLED: false
      FANMIND_ENABLE_REFERRAL_BILLING: false
      FANMIND_ENABLE_TELEGRAM_SEND: false
      FANMIND_ADMIN_EMAILS: admin@example.com
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: release/final-go-live-readiness-20260719
          fetch-depth: 0

      - name: Update roadmap and source of truth
        run: |
          python3 - <<'PY'
          from pathlib import Path

          roadmap_path = Path('src/config/roadmap.ts')
          roadmap = roadmap_path.read_text(encoding='utf-8')
          roadmap_replacements = {
              '{ label: "Abrechnung & Admin-Basis", state: "partial", status: "Erledigt / Feinschliff" },':
                  '{ label: "Abrechnung & Admin-Basis", state: "done", status: "Erledigt" },',
              '{ label: "Profil/Paket/Rechnungen", state: "partial", status: "Erledigt / Feinschliff" },':
                  '{ label: "Profil/Paket/Rechnungen", state: "done", status: "Erledigt" },',
              '{ label: "Sales-Unterlagen", state: "planned", status: "Nächster Schritt" },':
                  '{ label: "Sales-Unterlagen", state: "done", status: "Vorbereitet" },',
              'status: "Gestartet",\n    statusIcon: "◷",\n    tone: "violet",\n    availability: "upcoming",\n    items: [\n      { label: "Operations-Grundlage", state: "progress", status: "In Arbeit" },\n      { label: "Produktions- und Testdaten trennen", state: "later", status: "Geplant" },\n      { label: "Release-Checks", state: "later", status: "Geplant" },\n      { label: "Umgebungs-Governance", state: "later", status: "Geplant" },\n    ],':
                  'status: "Technisch abgesichert",\n    statusIcon: "◷",\n    tone: "violet",\n    availability: "upcoming",\n    items: [\n      { label: "Operations-Grundlage", state: "done", status: "Produktiv aktiv" },\n      { label: "Produktions- und Testdaten trennen", state: "partial", status: "Policy aktiv · Staging offen" },\n      { label: "Release-Checks", state: "done", status: "Automatisch aktiv" },\n      { label: "Umgebungs-Governance", state: "partial", status: "Fail-closed aktiv · Staging offen" },\n    ],',
          }
          for old, new in roadmap_replacements.items():
              count = roadmap.count(old)
              if count != 1:
                  raise SystemExit(f'roadmap replacement count={count}: {old}')
              roadmap = roadmap.replace(old, new, 1)
          roadmap_path.write_text(roadmap, encoding='utf-8')

          truth_path = Path('docs/SOURCE_OF_TRUTH.md')
          truth = truth_path.read_text(encoding='utf-8')
          truth_replacements = {
              '- ein Arbeitsbereich für Nachrichtenkontext, Memory und Follow-ups;':
                  '- ein Arbeitsbereich für Nachrichtenkontext, Kontaktwissen und Follow-ups;',
              '## 2. Aktiver MVP-/CRM-Kern':
                  '## 2. Aktiver CRM-Kern',
              '- Registrierung für Pilot und Starter':
                  '- Registrierung für Starter; kostenlose temporäre Demo getrennt',
              '- Memory\n':
                  '- Kontaktwissen\n',
              '- Memory-Vorschlag aus KI-Ausgabe':
                  '- Kontaktwissen-Vorschlag aus KI-Ausgabe',
              '- Abrechnung & Admin-Basis: erledigt / Feinschliff.':
                  '- Abrechnung & Admin-Basis: erledigt.',
              '- Profil/Paket/Rechnungen: erledigt / Feinschliff.':
                  '- Profil/Paket/Rechnungen: erledigt.',
              '- Sales-Unterlagen: nächster Schritt.':
                  '- Sales-Unterlagen: vorbereitet.',
          }
          for old, new in truth_replacements.items():
              count = truth.count(old)
              if count != 1:
                  raise SystemExit(f'truth replacement count={count}: {old}')
              truth = truth.replace(old, new, 1)

          anchor = '- Offen sichtbar bleiben der finale Go-Live-Smoke-Test und die Steuerberater-Bestätigung.\n'
          phase5 = '''- Offen sichtbar bleiben der finale Go-Live-Smoke-Test und die Steuerberater-Bestätigung.

Aktueller Roadmap-Stand für Phase 5:

- Operations-Grundlage: produktiv aktiv.
- Release-Checks: automatisch aktiv.
- Produktions-/Testtrennung: Fail-closed-Policy, Preflight und Staging-Vorlage sind aktiv; ein separates Supabase-/Stripe-/DNS-Staging bleibt extern einzurichten.
- Umgebungs-Governance: schreibende Tests sind außerhalb eindeutig identifizierter Staging-/Testumgebungen blockiert.
- Staging-Infrastruktur ist Voraussetzung für Referral-Lifecycle-, Restore- und andere schreibende Nicht-Production-Tests, aber kein Grund, den read-only Produktions-Smoke-Test zu verzögern.
'''
          if truth.count(anchor) != 1:
              raise SystemExit(f'phase5 anchor count={truth.count(anchor)}')
          truth = truth.replace(anchor, phase5, 1)

          appendix = '''

## 12. Technische Go-Live-Freigabe

- Automatischer öffentlicher Preflight: `npm run smoke:go-live:public`.
- Nach jedem erfolgreichen Production-Deploy startet der Workflow `FanMind Final Go-Live Readiness` und prüft Routen, Health, Release-Commit, Preise und öffentliche Produktwahrheit.
- Der vollständige manuelle Ablauf steht in `docs/operations/FINAL_GO_LIVE_SMOKE_TEST.md`.
- Sales-One-Pager, Demo-Skript und Einwandbehandlung stehen unter `docs/sales/`.
- Technische Freigabe und externe Steuer-/Rechtsfreigabe werden getrennt dokumentiert.
- Referral-Billing, KI Plus/Ultra Auto-Buchung und schreibende Staging-Tests bleiben bis zu ihrer separaten Freigabe deaktiviert.
'''
          if '## 12. Technische Go-Live-Freigabe' not in truth:
              truth = truth.rstrip() + appendix + '\n'
          truth_path.write_text(truth, encoding='utf-8')
          PY

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Verify commercial and product truth
        run: npm run verify:truth

      - name: Lint
        run: npm run lint

      - name: Operations tests
        run: npm run test:operations

      - name: Production build
        run: npm run build

      - name: Read-only production preflight
        run: npm run smoke:go-live:public

      - name: Commit readiness package and remove one-off workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/one-off-final-go-live-readiness-20260719.yml
          git add src/config/roadmap.ts docs/SOURCE_OF_TRUTH.md
          git commit -m "Finalize go-live readiness status and documentation"
          git push origin HEAD:release/final-go-live-readiness-20260719
