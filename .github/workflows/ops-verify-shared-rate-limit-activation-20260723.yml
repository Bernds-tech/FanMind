name: FanMind P1 Verify Shared Rate Limit Activation

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/ops-verify-shared-rate-limit-activation-20260723.yml"
      - "scripts/operations/shared-rate-limit-activation-verify-temp-20260723.mjs"

concurrency:
  group: fanmind-p1-verify-shared-rate-limit-activation-20260723
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'ops/verify-shared-rate-limit-activation-20260723'
    runs-on:
      - self-hosted
      - fanmind-prod
      - exoscale
      - linux
      - x64
    timeout-minutes: 30
    env:
      EXPECTED_RELEASE: afabda57f7c12118746d858d7f39ebd70ca191c9
      REPORT_PATH: fanmind-shared-rate-limit-activation-verification.txt

    steps:
      - name: Checkout trusted verification branch
        uses: actions/checkout@v4
        with:
          ref: ops/verify-shared-rate-limit-activation-20260723
          fetch-depth: 1

      - name: Verify release, health, deployed source and real endpoint limits
        shell: bash
        run: |
          set -euo pipefail
          report="$GITHUB_WORKSPACE/$REPORT_PATH"
          sudo -n env \
            GITHUB_RUN_ID="$GITHUB_RUN_ID" \
            EXPECTED_RELEASE="$EXPECTED_RELEASE" \
            /usr/bin/node \
            "$GITHUB_WORKSPACE/scripts/operations/shared-rate-limit-activation-verify-temp-20260723.mjs" \
            "$report"

      - name: Upload sanitized verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fanmind-shared-rate-limit-activation-verification
          path: fanmind-shared-rate-limit-activation-verification.txt
          if-no-files-found: error
          retention-days: 14
