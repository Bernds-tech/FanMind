name: FanMind P1 Meta Pixel Referrer Patch

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/p1-meta-pixel-referrer-patch-20260724.yml"
      - "scripts/meta-pixel-referrer-patch-temp.mjs"

concurrency:
  group: fanmind-p1-meta-pixel-referrer-patch-20260724
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  patch:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'p1/meta-pixel-consent-20260724' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout trusted Meta Pixel branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: p1/meta-pixel-consent-20260724
          fetch-depth: 1
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Patch Meta referrer documentation
        run: |
          set -euo pipefail
          node scripts/meta-pixel-referrer-patch-temp.mjs
          git diff --check

      - name: Commit Meta referrer documentation
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add AGENTS.md README.md docs/SOURCE_OF_TRUTH.md docs/analytics/META_PIXEL.md docs/testing/BROWSER_E2E.md src/app/datenschutz/page.tsx
          git diff --cached --quiet && { echo "No Meta referrer changes" >&2; exit 1; }
          git commit -m "Document protected Meta referrer boundary"
          git push origin HEAD:p1/meta-pixel-consent-20260724
