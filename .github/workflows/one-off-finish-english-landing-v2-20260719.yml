name: One-off finish English landing v2 20260719

on:
  push:
    branches:
      - fix/english-landing-complete-v2-20260719

permissions:
  contents: write

jobs:
  finish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
      FANMIND_PUBLIC_DEMO_ENABLED: false
      FANMIND_ENABLE_REFERRAL_BILLING: false
      FANMIND_ENABLE_TELEGRAM_SEND: false
      FANMIND_ADMIN_EMAILS: admin@example.com
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/english-landing-complete-v2-20260719
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - name: Localize remaining static landing text
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('src/app/landing-v2/page.tsx')
          text = path.read_text(encoding='utf-8')

          text = text.replace(
              '<span>Fan-CRM für Nachrichten, Erinnerungen</span>',
              '<span>{t("Fan-CRM für Nachrichten, Erinnerungen")}</span>',
          )
          text = text.replace(
              '<span>ein nächster Schritt.</span>',
              '<span>{t("ein nächster Schritt.")}</span>',
          )
          text = re.sub(
              r'<p>\s*Beispieldaten zeigen den manuellen Workflow: Antwort vorbereiten, Follow-up planen und final selbst senden\.\s*</p>',
              '<p>{t("Beispieldaten zeigen den manuellen Workflow: Antwort vorbereiten, Follow-up planen und final selbst senden.")}</p>',
              text,
              count=1,
          )
          text = text.replace(
              '<FooterInquiryForm />',
              '<FooterInquiryForm language={language} />',
          )

          forbidden = [
              '<span>Fan-CRM für Nachrichten, Erinnerungen</span>',
              '<span>ein nächster Schritt.</span>',
              'Beispieldaten zeigen den manuellen Workflow: Antwort vorbereiten, Follow-up planen und final selbst senden.\n             </p>',
              '<FooterInquiryForm />',
          ]
          remaining = [value for value in forbidden if value in text]
          if remaining:
              raise SystemExit(f'Remaining unlocalized anchors: {remaining}')

          required = [
              't("Fan-CRM für Nachrichten, Erinnerungen")',
              't("ein nächster Schritt.")',
              't("Beispieldaten zeigen den manuellen Workflow: Antwort vorbereiten, Follow-up planen und final selbst senden.")',
              '<FooterInquiryForm language={language} />',
          ]
          missing = [value for value in required if value not in text]
          if missing:
              raise SystemExit(f'Missing localized anchors: {missing}')

          path.write_text(text, encoding='utf-8')
          PY
      - run: npm ci --no-audit --no-fund
      - run: npm run verify:truth
      - run: npm run lint
      - run: npm run test:operations
      - run: npm run build
      - name: Start and verify English landing
        run: |
          FANMIND_RELEASE_COMMIT="$(git rev-parse HEAD)" npm start > /tmp/fanmind-en-final.log 2>&1 &
          APP_PID=$!
          trap 'kill "$APP_PID" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 30); do
            if curl -fsS 'http://127.0.0.1:3000/?lang=en' -o /tmp/fanmind-en.html; then
              break
            fi
            sleep 2
          done
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import re

          class TextParser(HTMLParser):
              def __init__(self):
                  super().__init__(); self.skip = 0; self.nodes = []
              def handle_starttag(self, tag, attrs):
                  if tag in {'script', 'style', 'svg'}: self.skip += 1
              def handle_endtag(self, tag):
                  if tag in {'script', 'style', 'svg'} and self.skip: self.skip -= 1
              def handle_data(self, data):
                  if not self.skip:
                      value = ' '.join(data.split())
                      if value: self.nodes.append(value)

          parser = TextParser()
          parser.feed(Path('/tmp/fanmind-en.html').read_text(encoding='utf-8'))
          markers = re.compile(
              r'[äöüÄÖÜß]|\b(?:dein|deine|deinen|deinem|für|und|oder|heute|morgen|'
              r'kostenlos|testen|kontakte|kontakt|manuell|manuelle|nächste|nächsten|'
              r'vorschlag|vorschläge|verfügbar|keine|kein|kampagnen|nachrichten|'
              r'erinnerungen|antworten|prüfung|freigabe|beispieldaten|einmalig|'
              r'monat|monate|jederzeit|kündbar|einrichtung|aktiv|bereit|inaktiv|'
              r'später|auswertung|übersicht|wichtig|interessen|historie|speichern|'
              r'vorbereiten|senden|versand|nachfassaktionen|wachstumssignale)\b',
              re.IGNORECASE,
          )
          seen = []
          for node in parser.nodes:
              if markers.search(node) and node not in seen:
                  seen.append(node)
          print(f'GERMAN_NODE_COUNT={len(seen)}')
          for index, node in enumerate(seen, 1):
              print(f'GERMAN_NODE_{index:03d}={node}')
          if seen:
              raise SystemExit(f'English landing still contains {len(seen)} likely German visible text nodes')
          PY
      - name: Commit final localization and remove temporary workflows
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/one-off-audit-english-v2-20260719.yml
          git rm -f .github/workflows/one-off-finish-english-landing-v2-20260719.yml
          git add src/app/landing-v2/page.tsx src/components/landing/FooterInquiryForm.tsx src/app/page.tsx src/lib/fanmindCopyComplete.ts src/lib/landingEnglishCopy.ts tsconfig.json
          git commit -m "Finish complete English landing localization"
          git push origin HEAD:fix/english-landing-complete-v2-20260719
