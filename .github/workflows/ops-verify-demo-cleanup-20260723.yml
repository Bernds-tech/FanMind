name: FanMind P1 Verify Demo Cleanup After Fix

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/ops-verify-demo-cleanup-20260723.yml"

concurrency:
  group: fanmind-p1-verify-demo-cleanup-20260723
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'ops/verify-demo-cleanup-20260723'
    runs-on:
      - self-hosted
      - fanmind-prod
      - exoscale
      - linux
      - x64
    timeout-minutes: 15
    env:
      EXPECTED_RELEASE: 91ac1b3240f1a2c773638acface54668049d49f9
      VERIFY_SINCE_UTC: 2026-07-23T06:15:00Z
      VERIFY_REPORT_PATH: fanmind-demo-cleanup-production-verification.txt
    steps:
      - name: Validate exact deployed release and public health
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          report="$GITHUB_WORKSPACE/$VERIFY_REPORT_PATH"
          : > "$report"

          {
            printf 'VERIFY_UTC=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            printf 'EXPECTED_RELEASE=%s\n' "$EXPECTED_RELEASE"

            release="$(curl -fsSL --max-time 15 https://fanmind.ch/api/version \
              | node -e '
                  let input = "";
                  process.stdin.on("data", chunk => input += chunk);
                  process.stdin.on("end", () => {
                    const payload = JSON.parse(input);
                    const value = typeof payload.releaseCommit === "string" ? payload.releaseCommit : "";
                    process.stdout.write(/^[0-9a-f]{40}$/.test(value) ? value : "missing");
                  });
                ')"
            printf 'LIVE_RELEASE=%s\n' "$release"
            if [[ "$release" != "$EXPECTED_RELEASE" ]]; then
              echo 'DEPLOY_RESULT=expected_release_not_live'
              exit 1
            fi
            echo 'DEPLOY_RESULT=exact_release_live'

            server_head="$(git -C /var/www/fanmind rev-parse HEAD)"
            origin_main="$(git -C /var/www/fanmind rev-parse origin/main)"
            printf 'SERVER_HEAD=%s\n' "$server_head"
            printf 'ORIGIN_MAIN=%s\n' "$origin_main"
            if [[ "$server_head" != "$EXPECTED_RELEASE" || "$origin_main" != "$EXPECTED_RELEASE" ]]; then
              echo 'SERVER_SYNC=failed'
              exit 1
            fi
            echo 'SERVER_SYNC=ok'
          } | tee -a "$report"

          health_file="$RUNNER_TEMP/fanmind-health-${GITHUB_RUN_ID}.json"
          curl -fsSL --max-time 15 https://fanmind.ch/api/health > "$health_file"
          HEALTH_FILE="$health_file" node <<'NODE' | tee -a "$report"
          const fs = require('node:fs');
          const payload = JSON.parse(fs.readFileSync(process.env.HEALTH_FILE, 'utf8'));
          const checks = Array.isArray(payload.checks) ? payload.checks : [];
          const status = typeof payload.status === 'string' ? payload.status : 'missing';
          console.log(`LIVE_HEALTH=${status}`);
          for (const check of checks) {
            const component = String(check?.component || 'unknown').replace(/[^a-zA-Z0-9_.:-]/g, '_').slice(0, 80);
            const componentStatus = String(check?.status || 'missing').replace(/[^a-zA-Z0-9_.:-]/g, '_').slice(0, 40);
            console.log(`HEALTH_COMPONENT=${component}:${componentStatus}`);
          }
          if (status !== 'healthy' || checks.length === 0 || checks.some(check => check?.status !== 'healthy')) {
            process.exitCode = 1;
          }
          NODE
          rm -f "$health_file"

      - name: Verify automatic cleanup completion read-only
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          report="$GITHUB_WORKSPACE/$VERIFY_REPORT_PATH"
          log_file="$RUNNER_TEMP/fanmind-demo-cleanup-${GITHUB_RUN_ID}.log"

          {
            sudo -n systemctl show fanmind-demo-cleanup.service \
              --property=ActiveState,SubState,Result,ExecMainStatus,ExecMainStartTimestamp,ExecMainExitTimestamp \
              --no-pager \
              | sort \
              | sed 's/^/DEMO_SERVICE_/'
          } | tee -a "$report"

          service_result="$(sudo -n systemctl show fanmind-demo-cleanup.service --property=Result --value)"
          service_exit="$(sudo -n systemctl show fanmind-demo-cleanup.service --property=ExecMainStatus --value)"
          if [[ "$service_result" != "success" || "$service_exit" != "0" ]]; then
            echo 'DEMO_SERVICE_VERIFICATION=failed' | tee -a "$report"
            exit 1
          fi
          echo 'DEMO_SERVICE_VERIFICATION=success' | tee -a "$report"

          sudo -n journalctl \
            -u fanmind-demo-cleanup.service \
            --since "$VERIFY_SINCE_UTC" \
            --no-pager \
            -o cat > "$log_file"

          sudo -n node - "$log_file" "$VERIFY_SINCE_UTC" <<'NODE' | tee -a "$report"
          const fs = require('node:fs');

          function sanitize(value, max = 120) {
            return String(value || 'unknown').replace(/[^a-zA-Z0-9_.:-]/g, '_').slice(0, max);
          }

          function parseEnv(text) {
            const values = new Map();
            for (const rawLine of text.split(/\r?\n/)) {
              const line = rawLine.trim();
              if (!line || line.startsWith('#') || !line.includes('=')) continue;
              const separator = line.indexOf('=');
              const key = line.slice(0, separator).trim();
              let value = line.slice(separator + 1).trim();
              if (
                value.length >= 2 &&
                ((value.startsWith('"') && value.endsWith('"')) ||
                  (value.startsWith("'") && value.endsWith("'")))
              ) {
                value = value.slice(1, -1);
              }
              values.set(key, value);
            }
            return values;
          }

          async function main() {
            const logPath = process.argv[2];
            const sinceUtc = process.argv[3];
            const env = parseEnv(fs.readFileSync('/var/www/fanmind/.env.production', 'utf8'));
            const baseUrl = (env.get('NEXT_PUBLIC_SUPABASE_URL') || '').replace(/\/$/, '');
            const serviceKey = env.get('SUPABASE_SERVICE_ROLE_KEY') || '';
            if (!baseUrl || !serviceKey) throw new Error('required_server_configuration_missing');

            const headers = {
              apikey: serviceKey,
              Authorization: `Bearer ${serviceKey}`,
              'Content-Type': 'application/json',
            };

            async function getJson(url) {
              const response = await fetch(url, {
                method: 'GET',
                headers,
                cache: 'no-store',
                signal: AbortSignal.timeout(12000),
              });
              if (!response.ok) throw new Error(`read_http_${response.status}`);
              return response.json();
            }

            async function exactCount(url) {
              const response = await fetch(url, {
                method: 'GET',
                headers: { ...headers, Prefer: 'count=exact' },
                cache: 'no-store',
                signal: AbortSignal.timeout(12000),
              });
              if (!response.ok) throw new Error(`count_http_${response.status}`);
              const contentRange = response.headers.get('content-range') || '';
              const total = Number(contentRange.split('/').at(-1));
              if (!Number.isFinite(total)) throw new Error('count_header_invalid');
              return total;
            }

            const now = new Date();
            const claimableUrl = new URL(`${baseUrl}/rest/v1/demo_start_sessions`);
            claimableUrl.searchParams.set('select', 'id');
            claimableUrl.searchParams.set('status', 'in.(active,expired,cleanup_failed)');
            claimableUrl.searchParams.set('expires_at', `lte.${now.toISOString()}`);
            claimableUrl.searchParams.set('limit', '1');
            const claimableCount = await exactCount(claimableUrl);

            const failedUrl = new URL(`${baseUrl}/rest/v1/demo_start_sessions`);
            failedUrl.searchParams.set('select', 'id');
            failedUrl.searchParams.set('status', 'eq.cleanup_failed');
            failedUrl.searchParams.set('limit', '1');
            const cleanupFailedCount = await exactCount(failedUrl);

            const deletedUrl = new URL(`${baseUrl}/rest/v1/demo_start_sessions`);
            deletedUrl.searchParams.set(
              'select',
              'status,error_code,auth_user_id,workspace_id,cleanup_completed_at,updated_at',
            );
            deletedUrl.searchParams.set('status', 'eq.deleted');
            deletedUrl.searchParams.set('cleanup_completed_at', `gte.${sinceUtc}`);
            deletedUrl.searchParams.set('order', 'cleanup_completed_at.asc');
            deletedUrl.searchParams.set('limit', '10');
            const deletedRows = await getJson(deletedUrl);
            if (!Array.isArray(deletedRows)) throw new Error('deleted_session_payload_invalid');

            const safelyDeletedRows = deletedRows.filter(row =>
              row?.status === 'deleted' &&
              row?.error_code == null &&
              row?.auth_user_id == null &&
              row?.workspace_id == null &&
              typeof row?.cleanup_completed_at === 'string'
            );

            const logLines = fs.readFileSync(logPath, 'utf8').split(/\r?\n/);
            const summaries = [];
            for (const line of logLines) {
              const match = line.match(
                /FanMind demo cleanup: claimed=(\d+) deleted=(\d+) failed=(\d+)(?: error_codes=([a-z0-9_,:-]+))?/
              );
              if (!match) continue;
              summaries.push({
                claimed: Number(match[1]),
                deleted: Number(match[2]),
                failed: Number(match[3]),
                errorCodes: match[4] || '',
              });
            }
            const latest = summaries.at(-1) || null;
            const summaryOk = Boolean(
              latest &&
              latest.claimed === 1 &&
              latest.deleted === 1 &&
              latest.failed === 0 &&
              latest.errorCodes === ''
            );

            console.log(`AUTOMATIC_CLEANUP_SUMMARY_COUNT=${summaries.length}`);
            console.log(`AUTOMATIC_CLEANUP_LATEST_CLAIMED=${latest?.claimed ?? 'missing'}`);
            console.log(`AUTOMATIC_CLEANUP_LATEST_DELETED=${latest?.deleted ?? 'missing'}`);
            console.log(`AUTOMATIC_CLEANUP_LATEST_FAILED=${latest?.failed ?? 'missing'}`);
            console.log(`AUTOMATIC_CLEANUP_LATEST_ERROR_CODES=${latest?.errorCodes || 'none'}`);
            console.log(`RECENT_DELETED_SESSION_COUNT=${deletedRows.length}`);
            console.log(`RECENT_SAFE_DELETED_SESSION_COUNT=${safelyDeletedRows.length}`);
            console.log(`CLAIMABLE_EXPIRED_SESSION_COUNT=${claimableCount}`);
            console.log(`CLEANUP_FAILED_SESSION_COUNT=${cleanupFailedCount}`);

            if (
              !summaryOk ||
              deletedRows.length < 1 ||
              safelyDeletedRows.length !== deletedRows.length ||
              claimableCount !== 0 ||
              cleanupFailedCount !== 0
            ) {
              throw new Error('automatic_cleanup_postconditions_failed');
            }

            console.log('AUTOMATIC_CLEANUP_RESULT=success');
          }

          main().catch(error => {
            console.error('AUTOMATIC_CLEANUP_RESULT=failed');
            console.error(`AUTOMATIC_CLEANUP_REASON=${sanitize(error instanceof Error ? error.message : error)}`);
            process.exit(1);
          });
          NODE

          rm -f "$log_file"

      - name: Upload sanitized production verification
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fanmind-demo-cleanup-production-verification
          path: fanmind-demo-cleanup-production-verification.txt
          if-no-files-found: error
          retention-days: 7
