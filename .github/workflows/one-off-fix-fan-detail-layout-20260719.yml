name: One-off fix fan detail layout 20260719

on:
  push:
    branches:
      - fix/fan-detail-sticky-layout-20260719

permissions:
  contents: write

jobs:
  fix-layout:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_APP_URL: https://fanmind.ch
      NEXT_PUBLIC_SITE_URL: https://fanmind.ch
      FANMIND_PUBLIC_DEMO_ENABLED: false
      FANMIND_ENABLE_REFERRAL_BILLING: false
      FANMIND_ENABLE_TELEGRAM_SEND: false
      FANMIND_ADMIN_EMAILS: admin@example.com
    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: fix/fan-detail-sticky-layout-20260719
          fetch-depth: 0

      - name: Fix fan detail layout and add regression test
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import json

          css_path = Path('src/app/fans/[id]/fan-detail.module.css')
          css = css_path.read_text(encoding='utf-8')

          group = '''.rail,
          .conversation,
          .copilot {
            display: grid;
            gap: 10px;
            min-width: 0;
          }
          '''
          replacement_group = '''.rail,
          .conversation,
          .copilot {
            display: grid;
            gap: 10px;
            min-width: 0;
          }

          .copilot {
            position: sticky;
            top: 0;
            align-self: start;
            max-height: calc(100dvh - 94px);
            overflow-x: hidden;
            overflow-y: auto;
            overscroll-behavior: contain;
            scrollbar-width: thin;
          }
          '''
          if css.count(group) != 1:
              raise SystemExit(f'copilot group replacement count={css.count(group)}')
          css = css.replace(group, replacement_group, 1)

          old_reply = '''.replyCard {
            position: sticky;
            bottom: 10px;
            z-index: 1;
          }
          '''
          new_reply = '''.replyCard {
            position: static;
            z-index: auto;
          }
          '''
          if css.count(old_reply) != 1:
              raise SystemExit(f'replyCard replacement count={css.count(old_reply)}')
          css = css.replace(old_reply, new_reply, 1)

          media_anchor = '''@media (max-width: 1080px) {
            .workbenchGrid {
              grid-template-columns: 1fr;
            }
          '''
          media_replacement = '''@media (max-width: 1080px) {
            .workbenchGrid {
              grid-template-columns: 1fr;
            }

            .copilot {
              position: static;
              max-height: none;
              overflow: visible;
            }
          '''
          if css.count(media_anchor) != 1:
              raise SystemExit(f'responsive replacement count={css.count(media_anchor)}')
          css = css.replace(media_anchor, media_replacement, 1)
          css_path.write_text(css, encoding='utf-8')

          test_path = Path('tests/fan-detail-layout-policy.test.mjs')
          test_path.write_text('''import assert from "node:assert/strict";\nimport test from "node:test";\nimport { readFile } from "node:fs/promises";\n\nconst cssPath = "src/app/fans/[id]/fan-detail.module.css";\n\ntest("fan detail AI composer stays in normal flow and cannot overlap the message timeline", async () => {\n  const css = await readFile(cssPath, "utf8");\n  const replyRule = css.match(/\\.replyCard\\s*\\{([^}]*)\\}/u)?.[1] ?? "";\n\n  assert.match(replyRule, /position:\\s*static/u);\n  assert.doesNotMatch(replyRule, /position:\\s*(?:sticky|fixed|absolute)/u);\n  assert.doesNotMatch(replyRule, /bottom:/u);\n});\n\ntest("fan context rail remains visible on desktop and returns to normal flow on narrow screens", async () => {\n  const css = await readFile(cssPath, "utf8");\n\n  assert.match(css, /\\.copilot\\s*\\{[\\s\\S]*?position:\\s*sticky;[\\s\\S]*?top:\\s*0;[\\s\\S]*?max-height:\\s*calc\\(100dvh - 94px\\);[\\s\\S]*?overflow-y:\\s*auto;/u);\n  assert.match(css, /@media \\(max-width:\\s*1080px\\)[\\s\\S]*?\\.copilot\\s*\\{[\\s\\S]*?position:\\s*static;[\\s\\S]*?max-height:\\s*none;[\\s\\S]*?overflow:\\s*visible;/u);\n});\n''', encoding='utf-8')

          package_path = Path('package.json')
          package = json.loads(package_path.read_text(encoding='utf-8'))
          script = package['scripts']['test:operations']
          test_name = 'tests/fan-detail-layout-policy.test.mjs'
          if test_name not in script:
              package['scripts']['test:operations'] = f'{script} {test_name}'
          package_path.write_text(json.dumps(package, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Verify product truth
        run: npm run verify:truth

      - name: Lint
        run: npm run lint

      - name: Operations tests
        run: npm run test:operations

      - name: Production build
        run: npm run build

      - name: Commit fix and remove one-off workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/one-off-fix-fan-detail-layout-20260719.yml
          git add src/app/fans/[id]/fan-detail.module.css tests/fan-detail-layout-policy.test.mjs package.json
          git commit -m "Fix fan detail composer overlap and sticky context rail"
          git push origin HEAD:fix/fan-detail-sticky-layout-20260719
