name: One-off mobile lockfile 20260718

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    if: github.head_ref == 'feat/mobile-app-foundation-20260718' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/mobile-app-foundation-20260718
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.1
      - name: Generate deterministic mobile lockfile
        working-directory: apps/mobile
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund
      - name: Commit mobile lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/mobile/package-lock.json
          git diff --cached --quiet && exit 0
          git commit -m "Lock FanMind mobile dependencies"
          git push origin HEAD:feat/mobile-app-foundation-20260718
