name: FanMind P1 Offsite Retention Read-only Dry Run V2

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/ops-offsite-retention-dry-run-v2-20260723.yml"
      - "scripts/operations/offsite-retention-dry-run-temp-20260723.mjs"

concurrency:
  group: fanmind-p1-offsite-retention-dry-run-v2-20260723
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  plan:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'ops/offsite-retention-dry-run-20260723'
    runs-on:
      - self-hosted
      - fanmind-prod
      - exoscale
      - linux
      - x64
    timeout-minutes: 16
    env:
      REPORT_PATH: fanmind-offsite-retention-dry-run.txt
    steps:
      - name: Checkout trusted main-based branch
        uses: actions/checkout@v4
        with:
          ref: ops/offsite-retention-dry-run-20260723

      - name: Build redacted offsite retention plan
        shell: bash
        run: |
          set -euo pipefail
          report="$GITHUB_WORKSPACE/$REPORT_PATH"
          sudo -n /usr/bin/node \
            "$GITHUB_WORKSPACE/scripts/operations/offsite-retention-dry-run-temp-20260723.mjs" \
            "$report"

      - name: Upload redacted dry-run evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fanmind-offsite-retention-dry-run
          path: fanmind-offsite-retention-dry-run.txt
          if-no-files-found: error
          retention-days: 7
