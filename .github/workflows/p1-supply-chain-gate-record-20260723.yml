name: FanMind P1 Supply Chain Gate Record

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/p1-supply-chain-gate-record-20260723.yml"

concurrency:
  group: fanmind-p1-supply-chain-gate-record-20260723
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  issues: write
  packages: read
  security-events: write

jobs:
  validate-and-record:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'p1/supply-chain-hardening-20260723'
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_APP_URL: https://fanmind.ch
      NEXT_PUBLIC_SITE_URL: https://fanmind.ch
      FANMIND_PUBLIC_DEMO_ENABLED: "false"
      FANMIND_ENABLE_REFERRAL_BILLING: "false"
      FANMIND_ENABLE_TELEGRAM_SEND: "false"
      FANMIND_ADMIN_EMAILS: admin@example.com
      EXPO_PUBLIC_SUPABASE_URL: https://exampleproject.supabase.co
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-public-anon-key-1234567890
      EXPO_PUBLIC_FANMIND_API_URL: https://fanmind.ch
      EXPO_NO_TELEMETRY: "1"
      GH_TOKEN: ${{ github.token }}
      REPORT_PATH: fanmind-p1-supply-chain-gate-record.md
    steps:
      - name: Checkout trusted hardening branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: p1/supply-chain-hardening-20260723
          fetch-depth: 1
          show-progress: false

      - name: Initialize CodeQL
        id: codeql_init
        continue-on-error: true
        uses: github/codeql-action/init@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3.35.3
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Set up Node.js
        id: setup_node
        continue-on-error: true
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/mobile/package-lock.json

      - name: Install web and Mobile dependencies
        id: install
        continue-on-error: true
        run: |
          set -euo pipefail
          npm ci --no-audit --no-fund
          npm ci --prefix apps/mobile --no-audit --no-fund

      - name: Verify product truth and immutable Action policy
        id: truth
        continue-on-error: true
        run: npm run verify:truth

      - name: Lint
        id: lint
        continue-on-error: true
        run: npm run lint

      - name: Operations tests
        id: operations
        continue-on-error: true
        run: npm run test:operations

      - name: Production build
        id: build
        continue-on-error: true
        run: npm run build

      - name: Mobile typecheck, Doctor, Android export and boundary
        id: mobile
        continue-on-error: true
        run: |
          set -euo pipefail
          npm run --prefix apps/mobile typecheck
          npm run --prefix apps/mobile doctor
          npm run --prefix apps/mobile export:android
          npm run --prefix apps/mobile boundary

      - name: Dependency audit
        id: audit
        continue-on-error: true
        run: npm run security:audit -- --report dependency-audit-report.json

      - name: CycloneDX SBOM
        id: sbom
        continue-on-error: true
        run: npm run security:sbom -- --output-dir sbom-artifacts

      - name: Analyze JavaScript and TypeScript
        id: codeql_analyze
        continue-on-error: true
        uses: github/codeql-action/analyze@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3.35.3
        with:
          category: "/language:javascript-typescript-p1-record"

      - name: Build redacted gate record
        if: always()
        env:
          SETUP_NODE_OUTCOME: ${{ steps.setup_node.outcome }}
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          TRUTH_OUTCOME: ${{ steps.truth.outcome }}
          LINT_OUTCOME: ${{ steps.lint.outcome }}
          OPERATIONS_OUTCOME: ${{ steps.operations.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          MOBILE_OUTCOME: ${{ steps.mobile.outcome }}
          AUDIT_OUTCOME: ${{ steps.audit.outcome }}
          SBOM_OUTCOME: ${{ steps.sbom.outcome }}
          CODEQL_INIT_OUTCOME: ${{ steps.codeql_init.outcome }}
          CODEQL_ANALYZE_OUTCOME: ${{ steps.codeql_analyze.outcome }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const outcomes = {
            setupNode: process.env.SETUP_NODE_OUTCOME,
            install: process.env.INSTALL_OUTCOME,
            truthAndActionPins: process.env.TRUTH_OUTCOME,
            lint: process.env.LINT_OUTCOME,
            operationsTests: process.env.OPERATIONS_OUTCOME,
            productionBuild: process.env.BUILD_OUTCOME,
            mobile: process.env.MOBILE_OUTCOME,
            dependencyAudit: process.env.AUDIT_OUTCOME,
            cyclonedxSbom: process.env.SBOM_OUTCOME,
            codeqlInit: process.env.CODEQL_INIT_OUTCOME,
            codeqlAnalyze: process.env.CODEQL_ANALYZE_OUTCOME,
          };
          let audit = null;
          let sbom = null;
          try { audit = JSON.parse(fs.readFileSync('dependency-audit-report.json', 'utf8')); } catch {}
          try { sbom = JSON.parse(fs.readFileSync('sbom-artifacts/sbom-summary.json', 'utf8')); } catch {}
          const allSuccess = Object.values(outcomes).every(value => value === 'success');
          const lines = [
            '## P1 Supply-Chain Gate Record',
            '',
            `- UTC: ${new Date().toISOString()}`,
            `- Commit: \`${process.env.GITHUB_SHA}\``,
            `- Workflow run: \`${process.env.GITHUB_RUN_ID}\``,
            `- Overall: **${allSuccess ? 'success' : 'failed'}**`,
            '',
            '| Gate | Outcome |',
            '| --- | --- |',
            ...Object.entries(outcomes).map(([name, value]) => `| ${name} | ${value} |`),
          ];
          if (audit?.result) {
            lines.push(
              '',
              `- Root audit: critical ${audit.result.root.critical}, high ${audit.result.root.high}, moderate ${audit.result.root.moderate}.`,
              `- Mobile audit: critical ${audit.result.mobile.critical}, high ${audit.result.mobile.high}.`,
              `- Reviewed root exception expires: ${audit.result.root.reviewedExceptionExpiresAt}.`,
            );
          }
          if (sbom?.web && sbom?.mobile) {
            lines.push(
              `- CycloneDX Web components: ${sbom.web.componentCount}.`,
              `- CycloneDX Mobile components: ${sbom.mobile.componentCount}.`,
            );
          }
          lines.push('', 'No secrets, environment values, advisory bodies or customer data are included.');
          fs.writeFileSync(process.env.REPORT_PATH, `${lines.join('\n')}\n`, { mode: 0o600 });
          fs.writeFileSync('gate-status.txt', allSuccess ? 'success\n' : 'failed\n');
          NODE
          cat "$REPORT_PATH"

      - name: Record gate in issue 671
        if: always()
        run: gh issue comment 671 --repo "$GITHUB_REPOSITORY" --body-file "$REPORT_PATH"

      - name: Upload gate record
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fanmind-p1-supply-chain-gate-record
          path: |
            fanmind-p1-supply-chain-gate-record.md
            gate-status.txt
          if-no-files-found: error
          retention-days: 7

      - name: Enforce complete gate
        if: always()
        run: test "$(cat gate-status.txt 2>/dev/null || printf failed)" = success
