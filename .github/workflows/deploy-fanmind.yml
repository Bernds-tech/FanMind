name: Deploy FanMind

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: fanmind-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Exoscale production
    runs-on:
      - self-hosted
      - fanmind-prod
      - exoscale
      - linux
      - x64

    steps:
      - name: Deploy on fanmind-prod-01
        run: |
          set -euo pipefail

          cd /var/www/fanmind

          echo "Deploying FanMind from origin/main on Exoscale..."
          git fetch --prune origin main
          git reset --hard origin/main

          npm ci --no-audit --no-fund
          npm run build

          pm2 restart fanmind --update-env
          pm2 save

          sudo nginx -t
          curl -fsSI https://fanmind.ch/login >/dev/null

          echo "FanMind deployment finished successfully."
