name: FanMind P1 Account Deletion Activation Patch

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/p1-account-deletion-activation-patch-20260724.yml"
      - "scripts/operations/account-deletion-activation-patch-temp-20260724.mjs"

concurrency:
  group: fanmind-p1-account-deletion-activation-patch-20260724
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  patch:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'ops/activate-account-deletion-20260724' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout trusted activation branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ops/activate-account-deletion-20260724
          fetch-depth: 1
          show-progress: false

      - name: Patch schema privilege verification
        run: |
          set -euo pipefail
          node scripts/operations/account-deletion-activation-patch-temp-20260724.mjs
          git diff --check

      - name: Commit activation verification fix
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/operations/activate-account-deletion-temp-20260724.mjs
          git diff --cached --quiet && { echo "No activation patch changes" >&2; exit 1; }
          git commit -m "Fix account deletion schema privilege verification"
          git push origin HEAD:ops/activate-account-deletion-20260724
