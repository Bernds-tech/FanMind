name: FanMind P1 Supply Chain Final Validation

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/p1-supply-chain-final-validation-20260723.yml"

concurrency:
  group: fanmind-p1-supply-chain-final-validation-20260723
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  packages: read
  security-events: write

jobs:
  validate:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'p1/supply-chain-hardening-20260723'
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_APP_URL: https://fanmind.ch
      NEXT_PUBLIC_SITE_URL: https://fanmind.ch
      FANMIND_PUBLIC_DEMO_ENABLED: "false"
      FANMIND_ENABLE_REFERRAL_BILLING: "false"
      FANMIND_ENABLE_TELEGRAM_SEND: "false"
      FANMIND_ADMIN_EMAILS: admin@example.com
      EXPO_PUBLIC_SUPABASE_URL: https://exampleproject.supabase.co
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-public-anon-key-1234567890
      EXPO_PUBLIC_FANMIND_API_URL: https://fanmind.ch
      EXPO_NO_TELEMETRY: "1"
      REPORT_PATH: fanmind-p1-supply-chain-final-validation.txt
    steps:
      - name: Checkout trusted hardening branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: p1/supply-chain-hardening-20260723
          fetch-depth: 1
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/mobile/package-lock.json

      - name: Install web and Mobile dependencies reproducibly
        run: |
          set -euo pipefail
          npm ci --no-audit --no-fund
          npm ci --prefix apps/mobile --no-audit --no-fund

      - name: Validate web, operations and Mobile
        shell: bash
        run: |
          set -euo pipefail
          : > "$REPORT_PATH"
          printf 'VALIDATION_UTC=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" | tee -a "$REPORT_PATH"
          printf 'VALIDATION_COMMIT=%s\n' "$(git rev-parse HEAD)" | tee -a "$REPORT_PATH"
          npm run verify:truth
          echo 'PRODUCT_TRUTH_AND_ACTION_PINS=success' | tee -a "$REPORT_PATH"
          npm run lint
          echo 'LINT=success' | tee -a "$REPORT_PATH"
          npm run test:operations
          echo 'OPERATIONS_TESTS=success' | tee -a "$REPORT_PATH"
          npm run build
          echo 'WEB_BUILD=success' | tee -a "$REPORT_PATH"
          npm run --prefix apps/mobile typecheck
          echo 'MOBILE_TYPECHECK=success' | tee -a "$REPORT_PATH"
          npm run --prefix apps/mobile doctor
          echo 'MOBILE_EXPO_DOCTOR=success' | tee -a "$REPORT_PATH"
          npm run --prefix apps/mobile export:android
          echo 'MOBILE_ANDROID_EXPORT=success' | tee -a "$REPORT_PATH"
          npm run --prefix apps/mobile boundary
          echo 'MOBILE_BOUNDARY=success' | tee -a "$REPORT_PATH"

      - name: Validate dependency audit and SBOM
        shell: bash
        run: |
          set -euo pipefail
          npm run security:audit -- --report dependency-audit-report.json
          echo 'DEPENDENCY_AUDIT=success' | tee -a "$REPORT_PATH"
          npm run security:sbom -- --output-dir sbom-artifacts
          echo 'CYCLONEDX_SBOM=success' | tee -a "$REPORT_PATH"
          node - <<'NODE' | tee -a "$REPORT_PATH"
          const fs = require('node:fs');
          const audit = JSON.parse(fs.readFileSync('dependency-audit-report.json', 'utf8'));
          const sbom = JSON.parse(fs.readFileSync('sbom-artifacts/sbom-summary.json', 'utf8'));
          console.log(`ROOT_AUDIT_CRITICAL=${audit.result.root.critical}`);
          console.log(`ROOT_AUDIT_HIGH=${audit.result.root.high}`);
          console.log(`ROOT_AUDIT_MODERATE=${audit.result.root.moderate}`);
          console.log(`ROOT_REVIEW_EXCEPTION_EXPIRES=${audit.result.root.reviewedExceptionExpiresAt}`);
          console.log(`MOBILE_AUDIT_CRITICAL=${audit.result.mobile.critical}`);
          console.log(`MOBILE_AUDIT_HIGH=${audit.result.mobile.high}`);
          console.log(`SBOM_WEB_COMPONENT_COUNT=${sbom.web.componentCount}`);
          console.log(`SBOM_MOBILE_COMPONENT_COUNT=${sbom.mobile.componentCount}`);
          console.log('FINAL_VALIDATION_RESULT=success');
          NODE

      - name: Upload final validation evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fanmind-p1-supply-chain-final-validation
          path: |
            fanmind-p1-supply-chain-final-validation.txt
            dependency-audit-report.json
            sbom-artifacts/sbom-summary.json
          if-no-files-found: warn
          retention-days: 7

  codeql-capability:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'p1/supply-chain-hardening-20260723'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout trusted hardening branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: p1/supply-chain-hardening-20260723
          fetch-depth: 1
          show-progress: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3.35.3
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Analyze JavaScript and TypeScript
        uses: github/codeql-action/analyze@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3.35.3
        with:
          category: "/language:javascript-typescript-p1-final"

      - name: Record successful CodeQL execution
        run: |
          printf '%s\n' \
            "CODEQL_COMMIT=$(git rev-parse HEAD)" \
            'CODEQL_EXTRACTION_ANALYSIS_UPLOAD=success' \
            'CODEQL_FINAL_VALIDATION_RESULT=success' \
            > codeql-final-validation.txt

      - name: Upload CodeQL capability evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fanmind-p1-codeql-final-validation
          path: codeql-final-validation.txt
          if-no-files-found: error
          retention-days: 7
