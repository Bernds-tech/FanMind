name: FanMind P1 Account Deletion Hardening

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/p1-account-deletion-hardening-20260724.yml"
      - "scripts/operations/account-deletion-hardening-temp-20260724.mjs"

concurrency:
  group: fanmind-p1-account-deletion-hardening-20260724
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  harden:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'p1/account-deletion-foundation-20260724' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout trusted account deletion branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: p1/account-deletion-foundation-20260724
          fetch-depth: 1
          show-progress: false

      - name: Apply fail-closed processor and discoverability hardening
        run: |
          set -euo pipefail
          node scripts/operations/account-deletion-hardening-temp-20260724.mjs
          git diff --check

      - name: Commit account deletion hardening
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/operations/process-account-deletion.mjs \
            src/app/settings/AccountSections.tsx \
            docs/testing/BROWSER_E2E.md \
            tests/account-deletion-policy.test.mjs
          git diff --cached --quiet && { echo "No hardening changes" >&2; exit 1; }
          git commit -m "Harden account deletion processing and discoverability"
          git push origin HEAD:p1/account-deletion-foundation-20260724
