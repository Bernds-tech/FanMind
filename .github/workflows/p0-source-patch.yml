name: FanMind P0 Source Patch

on:
  push:
    branches:
      - p0/completion-20260722
    paths:
      - "scripts/p0-source-patch.mjs"
      - ".github/workflows/p0-source-patch.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout P0 branch
        uses: actions/checkout@v4
        with:
          ref: p0/completion-20260722
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Apply guarded source patch
        run: node scripts/p0-source-patch.mjs

      - name: Validate patch
        run: |
          git diff --check
          grep -F 'href={`/settings/profile/data-export?lang=${locale}`}' src/app/settings/AccountSections.tsx
          ! grep -F 'DSGVO-Datenauskunft anfordern' src/app/settings/AccountSections.tsx
          ! grep -F 'logoutAction: () => Promise<void>' src/app/settings/AccountSections.tsx

      - name: Commit patched source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/settings/AccountSections.tsx src/app/settings/accountPages.tsx
          git commit -m "Remove legacy PDF disclosure actions"
          git push origin HEAD:p0/completion-20260722
