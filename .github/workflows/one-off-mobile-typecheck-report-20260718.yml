name: One-off mobile doctor report 20260718

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  report:
    if: github.head_ref == 'feat/mobile-app-foundation-20260718'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.1
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json
      - working-directory: apps/mobile
        run: npm ci --no-audit --no-fund
      - name: Capture Expo Doctor report
        id: doctor
        continue-on-error: true
        working-directory: apps/mobile
        shell: bash
        env:
          EXPO_NO_TELEMETRY: "1"
        run: |
          set -o pipefail
          npm run doctor 2>&1 | tee mobile-doctor-report.txt
      - name: Upload Expo Doctor report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-doctor-report
          path: apps/mobile/mobile-doctor-report.txt
          if-no-files-found: error
          retention-days: 3
      - name: Preserve Doctor result
        if: steps.doctor.outcome != 'success'
        run: exit 1
