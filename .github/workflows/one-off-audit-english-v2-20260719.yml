name: One-off English landing v2 runtime audit 20260719

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
      FANMIND_PUBLIC_DEMO_ENABLED: false
      FANMIND_ENABLE_REFERRAL_BILLING: false
      FANMIND_ENABLE_TELEGRAM_SEND: false
      FANMIND_ADMIN_EMAILS: admin@example.com
    steps:
      - uses: actions/checkout@v4
      - name: Capture source context for remaining strings
        run: |
          {
            grep -n -C 4 -F 'Fan-CRM für Nachrichten, Erinnerungen' src/app/landing-v2/page.tsx || true
            grep -n -C 4 -F 'ein nächster Schritt.' src/app/landing-v2/page.tsx || true
            grep -n -C 4 -F 'Beispieldaten zeigen den manuellen Workflow: Antwort vorbereiten, Follow-up planen und final selbst senden.' src/app/landing-v2/page.tsx || true
            grep -n -C 4 -F 'Persönliche Anfrage statt automatischem Newsletter.' src/app/landing-v2/page.tsx || true
          } > /tmp/english-landing-v2-source-context.txt
          cat /tmp/english-landing-v2-source-context.txt
      - name: Upload source context
        uses: actions/upload-artifact@v4
        with:
          name: english-landing-v2-source-context
          path: /tmp/english-landing-v2-source-context.txt
          retention-days: 7
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run verify:truth
      - run: npm run lint
      - run: npm run test:operations
      - run: npm run build
      - name: Start application
        run: |
          FANMIND_RELEASE_COMMIT="$(git rev-parse HEAD)" npm start > /tmp/fanmind-en-v2.log 2>&1 &
          echo $! > /tmp/fanmind-en-v2.pid
          for attempt in $(seq 1 30); do
            if curl -fsS 'http://127.0.0.1:3000/?lang=en' -o /tmp/fanmind-en.html; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/fanmind-en-v2.log
          exit 1
      - name: Audit visible English runtime copy
        run: |
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import re

          class TextParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.skip = 0
                  self.nodes = []
              def handle_starttag(self, tag, attrs):
                  if tag in {"script", "style", "svg"}:
                      self.skip += 1
              def handle_endtag(self, tag):
                  if tag in {"script", "style", "svg"} and self.skip:
                      self.skip -= 1
              def handle_data(self, data):
                  if self.skip:
                      return
                  value = " ".join(data.split())
                  if value:
                      self.nodes.append(value)

          parser = TextParser()
          parser.feed(Path('/tmp/fanmind-en.html').read_text(encoding='utf-8'))
          markers = re.compile(
              r"[äöüÄÖÜß]|\b(?:dein|deine|deinen|deinem|für|und|oder|heute|morgen|"
              r"kostenlos|testen|kontakte|kontakt|manuell|manuelle|nächste|nächsten|"
              r"vorschlag|vorschläge|verfügbar|keine|kein|kampagnen|nachrichten|"
              r"erinnerungen|antworten|prüfung|freigabe|beispieldaten|einmalig|"
              r"monat|monate|jederzeit|kündbar|einrichtung|aktiv|bereit|inaktiv|"
              r"später|auswertung|übersicht|wichtig|interessen|historie|speichern|"
              r"vorbereiten|senden|versand|nachfassaktionen|wachstumssignale)\b",
              re.IGNORECASE,
          )
          seen = []
          for node in parser.nodes:
              if markers.search(node) and node not in seen:
                  seen.append(node)
          lines = [f"GERMAN_NODE_COUNT={len(seen)}"]
          lines.extend(f"GERMAN_NODE_{index:03d}={node}" for index, node in enumerate(seen, 1))
          Path('/tmp/english-landing-v2-audit.txt').write_text("\n".join(lines) + "\n", encoding='utf-8')
          print("\n".join(lines))
          PY
      - name: Upload runtime audit report
        uses: actions/upload-artifact@v4
        with:
          name: english-landing-v2-runtime-audit
          path: /tmp/english-landing-v2-audit.txt
          retention-days: 7
      - name: Enforce complete English runtime copy
        run: |
          if ! grep -qx 'GERMAN_NODE_COUNT=0' /tmp/english-landing-v2-audit.txt; then
            cat /tmp/english-landing-v2-audit.txt
            exit 1
          fi
      - name: Stop application
        if: always()
        run: |
          if [ -f /tmp/fanmind-en-v2.pid ]; then
            kill "$(cat /tmp/fanmind-en-v2.pid)" 2>/dev/null || true
          fi
